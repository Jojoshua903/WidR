* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #cdcdcd; font-family: 'Segoe UI', Ubuntu, sans-serif; }
canvas { display: block; }

#menu {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
  color: #fff;
}
#menu h1 { font-size: 64px; margin-bottom: 4px; text-shadow: 3px 3px 0 rgba(0,0,0,.3); letter-spacing: 2px; }
#menu .sub { font-size: 18px; opacity: .7; margin-bottom: 28px; }
#menu .mp-badge { font-size: 13px; background: #e74c3c; padding: 3px 10px; border-radius: 4px; margin-bottom: 16px; letter-spacing: 1px; font-weight: 700; }
#nameInput, #roomInput {
  width: 280px; padding: 12px 16px; font-size: 18px; border: none; border-radius: 8px;
  text-align: center; margin-bottom: 12px; outline: none;
}
#roomInput { font-size: 15px; background: rgba(255,255,255,.85); }
#playBtn {
  padding: 14px 48px; font-size: 22px; font-weight: 700; border: none; border-radius: 8px;
  background: #e74c3c; color: #fff; cursor: pointer; transition: transform .1s;
  margin-top: 8px;
}
#playBtn:hover { transform: scale(1.05); }
#playBtn:active { transform: scale(.97); }
#connectionStatus {
  margin-top: 12px; font-size: 13px; opacity: .7;
}

#upgradePanel {
  position: fixed; bottom: 60px; left: 12px; z-index: 50;
  display: none; flex-direction: column; gap: 4px;
}
.stat-row {
  display: flex; align-items: center; gap: 6px; font-size: 13px; color: #333;
}
.stat-row .label { width: 100px; text-align: right; font-weight: 600; }
.stat-bar { display: flex; gap: 2px; }
.stat-pip { width: 14px; height: 14px; border-radius: 3px; background: #888; opacity: .3; }
.stat-pip.filled { background: #f1c40f; opacity: 1; }
.stat-btn {
  width: 22px; height: 22px; border: none; border-radius: 4px;
  background: #27ae60; color: #fff; font-weight: 700; font-size: 14px;
  cursor: pointer; line-height: 22px; text-align: center;
}
.stat-btn:hover { background: #2ecc71; }
.stat-btn.disabled { background: #999; cursor: default; }

#classPanel {
  position: fixed; bottom: 60px; right: 12px; z-index: 50;
  display: none; flex-direction: column; gap: 4px; align-items: flex-end;
}
.class-btn {
  padding: 6px 14px; font-size: 13px; font-weight: 600; border: none;
  border-radius: 6px; cursor: pointer; background: #3498db; color: #fff;
  transition: transform .1s;
}
.class-btn:hover { transform: scale(1.05); background: #2980b9; }

#hud {
  position: fixed; top: 0; left: 0; right: 0; z-index: 40;
  display: none; padding: 10px 16px; pointer-events: none;
}
#hud .name-tag { font-size: 16px; font-weight: 700; color: #333; }
#hud .level-tag { font-size: 14px; color: #555; margin-left: 8px; }
.xp-bar-outer {
  margin-top: 6px; width: 320px; height: 16px; background: rgba(0,0,0,.15);
  border-radius: 8px; overflow: hidden;
}
.xp-bar-inner { height: 100%; background: #f1c40f; transition: width .2s; width: 0%; }
#scoreDisplay { position: fixed; top: 10px; right: 16px; z-index: 40; font-size: 18px; font-weight: 700; color: #333; display: none; }
#classLabel { position: fixed; top: 34px; right: 16px; z-index: 40; font-size: 14px; color: #555; display: none; }
#onlineCount { position: fixed; top: 56px; right: 16px; z-index: 40; font-size: 13px; color: #27ae60; display: none; font-weight: 600; }
#minimap {
  position: fixed; bottom: 60px; right: 12px; z-index: 45;
  width: 140px; height: 140px; background: transparent; border-radius: 50%;
  border: 2px solid rgba(0,0,0,.2); display: none;
}

#leaderboard {
  position: fixed; top: 80px; right: 12px; z-index: 40;
  display: none; background: rgba(0,0,0,.35); border-radius: 8px;
  padding: 10px 14px; min-width: 160px; color: #fff;
}
#leaderboard h3 { font-size: 13px; margin-bottom: 6px; opacity: .8; text-align: center; }
.lb-entry { font-size: 12px; padding: 2px 0; display: flex; justify-content: space-between; gap: 12px; }
.lb-entry.me { color: #00b2e1; font-weight: 700; }

#deathScreen {
  position: fixed; inset: 0; z-index: 200; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,.65); color: #fff;
}
#deathScreen h2 { font-size: 48px; margin-bottom: 8px; }
#killedBy { font-size: 18px; margin-bottom: 4px; opacity: .7; }
#finalScore { font-size: 24px; margin-bottom: 24px; opacity: .8; }
#respawnBtn {
  padding: 12px 40px; font-size: 20px; font-weight: 700; border: none;
  border-radius: 8px; background: #e74c3c; color: #fff; cursor: pointer;
}

#configWarning {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: #e74c3c; color: #fff; text-align: center;
  padding: 10px; font-size: 14px; display: none;
}

@media print {
  body { background: #fff; }
  #menu, #hud, #upgradePanel, #classPanel, #minimap, #deathScreen, #scoreDisplay, #classLabel, #leaderboard, #onlineCount, #configWarning { display: none !important; }

function clampToCircle(obj, margin) {
  const dx = obj.x - WORLD_CX, dy = obj.y - WORLD_CY;

// ==================== MULTIPLAYER ====================
function setupMultiplayer(roomCode) {
  firebase.auth().signInAnonymously().then(cred => {
    myPlayerId = cred.user.uid;
    roomPlayersRef = db.ref('rooms/' + roomCode + '/players');
    roomDamageRef = db.ref('rooms/' + roomCode + '/damage/' + myPlayerId);

    roomPlayersRef.child(myPlayerId).onDisconnect().remove();

    roomPlayersRef.on('child_added', snap => {
      if(snap.key === myPlayerId) return;
      const data = snap.val();
      if(!data) return;
      const colorIdx = Math.abs(hashCode(snap.key)) % REMOTE_COLORS.length;
      remotePlayers[snap.key] = {
        id: snap.key,
        x: data.x || 0, y: data.y || 0,
        displayX: data.x || 0, displayY: data.y || 0,
        angle: data.a || 0, displayAngle: data.a || 0,
        classId: data.c || 'basic',
        name: data.n || 'Player',
        level: data.l || 1,
        hp: data.h || 1000, maxHp: data.mh || 1000,
        score: data.s || 0,
        color: REMOTE_COLORS[colorIdx],
        lastUpdate: Date.now(),
      };
      rebuildRemoteList();
    });

    roomPlayersRef.on('child_changed', snap => {
      if(snap.key === myPlayerId) return;
      const data = snap.val();
      if(!data || !remotePlayers[snap.key]) return;
      const rp = remotePlayers[snap.key];
      rp.x = data.x || 0;
      rp.y = data.y || 0;
      rp.angle = data.a || 0;
      rp.classId = data.c || 'basic';
      rp.name = data.n || 'Player';
      rp.level = data.l || 1;
      rp.hp = data.h || 1000;
      rp.maxHp = data.mh || 1000;
      rp.score = data.s || 0;
      rp.lastUpdate = Date.now();
    });

    roomPlayersRef.on('child_removed', snap => {
      delete remotePlayers[snap.key];
      rebuildRemoteList();
    });

    roomDamageRef.on('child_added', snap => {
      const dmg = snap.val();
      if(playing && player && dmg) {
        player.hp -= (dmg.d || 0);
        addParticle(player.x, player.y, COLORS.player);
        if(player.hp <= 0) {
          lastKilledBy = dmg.n || 'a player';
          die();
        }
      }
      snap.ref.remove();
    });

    document.getElementById('connectionStatus').textContent = 'Room: ' + roomCode;
  }).catch(err => {
    console.error('Firebase auth error:', err);
    offlineMode = true;
  });
}

function hashCode(str) {
  let hash = 0;
  for(let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash |= 0;
  }
  return hash;
}

function rebuildRemoteList() {
  remotePlayersList = Object.values(remotePlayers);
}

function syncMyState() {
  if(!firebaseReady || !roomPlayersRef || !myPlayerId || !playing) return;
  if(tick % 3 !== 0) return;
  roomPlayersRef.child(myPlayerId).set({
    x: Math.round(player.x),
    y: Math.round(player.y),
    a: Math.round(player.angle * 100) / 100,
    c: player.classId,
    n: player.name,
    l: player.level,
    h: Math.round(player.hp),
    mh: Math.round(player.maxHp),
    s: score,
  });
}

function sendDamageToRemote(targetId, amount) {
  if(!firebaseReady || !db) return;
  db.ref('rooms/' + currentRoomCode + '/damage/' + targetId).push({
    d: Math.round(amount),
    n: player.name,
  });
}

function updateRemotePlayers() {
  const now = Date.now();
  for(let i = remotePlayersList.length - 1; i >= 0; i--) {
    const rp = remotePlayersList[i];
    if(now - rp.lastUpdate > 15000) {
      delete remotePlayers[rp.id];
      remotePlayersList.splice(i, 1);
      continue;
    }
    rp.displayX += (rp.x - rp.displayX) * 0.12;
    rp.displayY += (rp.y - rp.displayY) * 0.12;
    rp.displayAngle = lerpAngle(rp.displayAngle, rp.angle, 0.12);
  }
}

function lerpAngle(a, b, t) {
  let diff = b - a;
  while(diff > Math.PI) diff -= Math.PI * 2;
  while(diff < -Math.PI) diff += Math.PI * 2;
  return a + diff * t;
}

function cleanupMultiplayer() {
  if(roomPlayersRef && myPlayerId) {
    roomPlayersRef.child(myPlayerId).remove();
    roomPlayersRef.off();
  }
  if(roomDamageRef) {
    roomDamageRef.off();
  }
  remotePlayers = {};
  remotePlayersList = [];
}

// ==================== STAT HELPERS ====================
function lvlMult(entity) { return 1 + (((entity || player).level || 1) - 1) * 0.025; }
function lvlMultHp(entity) { return 1 + (((entity || player).level || 1) - 1) * 0.05; }
function lvlMultFov() { return 1 + (player.level - 1) * 0.01; }

function collisionSelfDmg(targetSize, tankMaxHp, level) {
  if(level >= 700) return 0;
  const t = Math.min(1, targetSize / 320);
  const pct = 0.01 + t * 0.24;
  let dmg = tankMaxHp * pct;
  if(level > 200) dmg *= 1 - (level - 200) / 500;
  return dmg;
}

function getStatMult(statIdx, val) {
  if(val === undefined) val = stats[statIdx];
  const m = [
    0.0576, 57.6, 0.0288, 0.144, 0.288, 0.24, -0.0144, 0.0096,
  ];
  return val * m[statIdx];
}

// ==================== PLAYER UPDATE ====================
function updatePlayer() {
  if(player.invuln > 0) player.invuln--;
  const cls = TANK_CLASSES[player.classId];
  const spd = (cls.speed + getStatMult(7)) * 2.2 * lvlMult();

  let mx = 0, my = 0;
  if(keys['w'] || keys['arrowup']) my -= 1;
  if(keys['s'] || keys['arrowdown']) my += 1;
  if(keys['a'] || keys['arrowleft']) mx -= 1;
  if(keys['d'] || keys['arrowright']) mx += 1;
  const len = Math.sqrt(mx*mx+my*my);
  if(len > 0) { mx /= len; my /= len; }
  player.vx += mx * spd * 0.15;
  player.vy += my * spd * 0.15;
  player.vx *= 0.88;
  player.vy *= 0.88;
  player.x += player.vx;
  player.y += player.vy;
  clampToCircle(player, cls.bodySize * lvlMult());

  const wx = camera.x + (mouse.x - W/2) / camera.zoom;
  const wy = camera.y + (mouse.y - H/2) / camera.zoom;
  player.angle = Math.atan2(wy - player.y, wx - player.x);

  const regen = cls.hpRegen + getStatMult(0);
  player.hp = Math.min(player.maxHp, player.hp + regen);

  if(mouse.down || keys[' ']) {
    fireTank(player, cls, stats, null);
  }
  cls.barrels.forEach((b, i) => { if(player.reloadTimers[i] > 0) player.reloadTimers[i]--; });

  const targetX = wx, targetY = wy;
  player.drones.forEach(d => {
    const da = Math.atan2(targetY - d.y, targetX - d.x);
    d.vx += Math.cos(da) * 0.6;
    d.vy += Math.sin(da) * 0.6;
    const sp = Math.sqrt(d.vx*d.vx+d.vy*d.vy);
    if(sp > 4) { d.vx *= 4/sp; d.vy *= 4/sp; }
    d.x += d.vx; d.y += d.vy;
  });
}

function fireTank(entity, cls, entityStats, statMults) {
  cls.barrels.forEach((b, i) => {
    if(entity.reloadTimers[i] > 0) return;
    if(b.delayTicks && (tick % ((b.delayTicks+1)*2)) < b.delayTicks) return;

    let reload = b.reload;
    if(entityStats) reload = Math.max(3, reload + reload * getStatMult(6, entityStats[6]));
    if(statMults) reload *= statMults.reload;
    entity.reloadTimers[i] = Math.round(reload);

    const ang = entity.angle + b.angle + (Math.random()-0.5)*b.spread;
    const offX = b.offset ? Math.cos(entity.angle + Math.PI/2) * b.offset : 0;
    const offY = b.offset ? Math.sin(entity.angle + Math.PI/2) * b.offset : 0;

    let spd = b.speed;
    if(entityStats) spd += getStatMult(3, entityStats[3]);
    if(statMults) spd *= statMults.speed || 1;
    spd *= lvlMult(entity);
    if(!b.drone) spd = Math.max(10, Math.min(300, spd));

    let dmg = b.damage;
    if(entityStats) dmg += getStatMult(5, entityStats[5]);
    if(statMults) dmg *= statMults.damage;
    dmg *= lvlMult(entity);

    let pen = b.pen;
    if(entityStats) pen += getStatMult(4, entityStats[4]);

    const lm = lvlMult(entity);

    if(b.drone) {
      const maxD = b.maxDrones || 4;
      if(entity.drones.length >= maxD) return;
      const drone = {
        x: entity.x + offX + Math.cos(entity.angle + b.angle) * cls.bodySize,
        y: entity.y + offY + Math.sin(entity.angle + b.angle) * cls.bodySize,
        vx: Math.cos(ang) * 2, vy: Math.sin(ang) * 2,
        size: 12 * lm, hp: pen * 3, damage: dmg, owner: entity,
        isPlayerBullet: entity === player, isDrone: true,
      };
      entity.drones.push(drone);
      bullets.push(drone);
      return;
    }

    const sz = (b.sizeF || 1) * 6 * lm;
    const bul = {
      x: entity.x + offX + Math.cos(entity.angle + b.angle) * (cls.bodySize + b.length * 0.6),
      y: entity.y + offY + Math.sin(entity.angle + b.angle) * (cls.bodySize + b.length * 0.6),
      vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
      size: sz, hp: b.trap ? pen * 2.5 : pen, damage: dmg, owner: entity,
      isPlayerBullet: entity === player, life: b.trap ? 300 : 80,
      trap: b.trap || false,
    };
    bullets.push(bul);

    const recoil = (b.sizeF || 1) * 0.3;
    entity.vx -= Math.cos(ang) * recoil;
    entity.vy -= Math.sin(ang) * recoil;
  });
}

// ==================== ENEMY AI ====================
function updateEnemies() {
  enemies.forEach(e => {
    if(e.invuln > 0) e.invuln--;
    const cls = TANK_CLASSES[e.classId];
    if(!cls) return;
    e.aiTimer--;
    if(e.aiTimer <= 0) {
      e.aiTimer = 60 + Math.floor(Math.random()*60);
      const fovRange = Math.max(W, H) / (2 * camera.zoom);
      const dx = player.x - e.x, dy = player.y - e.y;
      const dp = Math.sqrt(dx*dx+dy*dy);
      let canSee = dp < fovRange;
      if(canSee) {
        for(let fi = 0; fi < foods.length; fi++) {
          const f = foods[fi];
          if(f.size < 30) continue;
          const fx = f.x - e.x, fy = f.y - e.y;
          const proj = (fx*dx + fy*dy) / (dp*dp);
          if(proj < 0 || proj > 1) continue;
          const cx = e.x + dx*proj - f.x, cy = e.y + dy*proj - f.y;
          if(Math.sqrt(cx*cx+cy*cy) < f.size + 10) { canSee = false; break; }
        }
      }
      e.target = canSee ? player : null;
      if(!e.target) e.wanderAngle += (Math.random()-0.5)*1.5;
    }

    const spd = cls.speed * (e.statMults?.speed || 1) * 1.6 * lvlMult(e);
    if(e.target) {
      const dx = e.target.x - e.x, dy = e.target.y - e.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      e.angle = Math.atan2(dy, dx);
      if(d > 100) {
        e.vx += (dx/d) * spd * 0.12;
        e.vy += (dy/d) * spd * 0.12;
      }
      fireTank(e, cls, null, e.statMults);
    } else {
      e.vx += Math.cos(e.wanderAngle) * spd * 0.05;
      e.vy += Math.sin(e.wanderAngle) * spd * 0.05;
      let nearFood = null, nfd = 250;
      foods.forEach(f => {
        const d = Math.sqrt((f.x-e.x)**2 + (f.y-e.y)**2);
        if(d < nfd) { nfd = d; nearFood = f; }
      });
      if(nearFood) {
        e.angle = Math.atan2(nearFood.y - e.y, nearFood.x - e.x);
        fireTank(e, cls, null, e.statMults);
      }
    }

    e.vx *= 0.9; e.vy *= 0.9;
    e.x += e.vx; e.y += e.vy;
    clampToCircle(e, cls.bodySize * lvlMult(e));

    cls.barrels.forEach((b, i) => { if(e.reloadTimers[i] > 0) e.reloadTimers[i]--; });

    e.hp = Math.min(e.maxHp, e.hp + cls.hpRegen * 1.5);

    if(e.drones.length > 0) {
      const tx = e.target ? e.target.x : e.x + Math.cos(e.angle)*200;
      const ty = e.target ? e.target.y : e.y + Math.sin(e.angle)*200;
      e.drones.forEach(d => {
        const da = Math.atan2(ty - d.y, tx - d.x);
        d.vx += Math.cos(da) * 0.5;
        d.vy += Math.sin(da) * 0.5;
        const sp = Math.sqrt(d.vx*d.vx+d.vy*d.vy);
        if(sp > 3.5) { d.vx *= 3.5/sp; d.vy *= 3.5/sp; }
        d.x += d.vx; d.y += d.vy;
      });
    }
  });
}

// ==================== BULLETS ====================
function updateBullets() {
  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if(b.isDrone) {
      if(b.hp <= 0) { bullets.splice(i,1); b.owner.drones = b.owner.drones.filter(d=>d!==b); continue; }
      continue;
    }
    if(b.trap) {
      b.vx *= 0.92; b.vy *= 0.92;
    }
    b.x += b.vx; b.y += b.vy;
    b.life--;
    const bd = Math.sqrt((b.x-WORLD_CX)**2 + (b.y-WORLD_CY)**2);
    if(b.life <= 0 || b.hp <= 0 || bd > WORLD_R + 100) {
      if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
      bullets.splice(i, 1);
    }
  }
}

function bulletVsBulletCollisions() {
  for(let i = bullets.length - 1; i >= 0; i--) {
    const a = bullets[i];
    for(let j = i - 1; j >= 0; j--) {
      const b = bullets[j];
      if(a.owner === b.owner) continue;
      if(a.isPlayerBullet === b.isPlayerBullet) continue;
      const dx = a.x - b.x, dy = a.y - b.y;
      const minD = a.size + b.size;
      if(Math.abs(dx) > minD || Math.abs(dy) > minD) continue;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d < minD) {
        const aHpBefore = a.hp;
        a.hp -= b.hp;
        b.hp -= aHpBefore;
        addParticle((a.x+b.x)/2, (a.y+b.y)/2, a.isPlayerBullet ? COLORS.player : COLORS.enemy);
        if(b.hp <= 0) {
          if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
          bullets.splice(j, 1);
          i--;
        }
        if(a.hp <= 0) {
          if(a.isDrone && a.owner) a.owner.drones = a.owner.drones.filter(d=>d!==a);
          const ai = bullets.indexOf(a);
          if(ai >= 0) bullets.splice(ai, 1);
          break;
        }
      }
    }
  }
}

// ==================== FOOD ====================
function updateFoods() {
  foods.forEach(f => {
    f.vx *= 0.95; f.vy *= 0.95;
    f.x += f.vx; f.y += f.vy;
    f.angle += f.spin;
    clampToCircle(f, f.size);
  });
}

function updateParticles() {
  for(let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life--;
    if(p.life <= 0) particles.splice(i, 1);
  }
}

// ==================== COLLISIONS ====================
function checkCollisions() {
  const cls = TANK_CLASSES[player.classId];
  const pSize = cls.bodySize * lvlMult();

  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    for(let j = foods.length-1; j >= 0; j--) {
      const f = foods[j];
      const d = Math.sqrt((b.x-f.x)**2 + (b.y-f.y)**2);
      if(d < b.size + f.size) {
        f.hp -= b.damage;
        b.hp -= 1;
        const kb = 0.03 / Math.pow(1.5, Math.log2(Math.max(1, f.size / 12)));
        f.vx += b.vx * kb; f.vy += b.vy * kb;
        addParticle(f.x, f.y, getColor(f.type));
        if(f.hp <= 0) {
          if(b.isPlayerBullet) {
            if(f.levelUp) addLevel();
            else addXP(f.xp);
          }
          addParticle(f.x, f.y, getColor(f.type));
          foods.splice(j, 1);
          spawnFood();
        }
        if(b.hp <= 0) {
          if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
          bullets.splice(i, 1);
          break;
        }
      }
    }
  }

  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if(b.isPlayerBullet) continue;
    const d = Math.sqrt((b.x-player.x)**2 + (b.y-player.y)**2);
    if(d < b.size + pSize && player.invuln <= 0) {
      player.hp -= b.damage;
      b.hp -= 1;
      addParticle(player.x, player.y, COLORS.player);
      if(b.hp <= 0) {
        if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
        bullets.splice(i, 1);
      }
      if(player.hp <= 0) { die(); return; }
    }
  }

  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if(!b.isPlayerBullet) continue;
    for(let j = enemies.length-1; j >= 0; j--) {
      const e = enemies[j];
      const ecls = TANK_CLASSES[e.classId];
      if(!ecls) continue;
      const d = Math.sqrt((b.x-e.x)**2 + (b.y-e.y)**2);
      if(d < b.size + ecls.bodySize * lvlMult(e) && e.invuln <= 0) {
        e.hp -= b.damage;
        b.hp -= 1;
        addParticle(e.x, e.y, COLORS.enemy);
        if(e.hp <= 0) {
          addXP(e.level * 18 + 50);
          addParticle(e.x, e.y, COLORS.enemy);
          e.drones.forEach(dr => { const idx = bullets.indexOf(dr); if(idx>=0) bullets.splice(idx,1); });
          enemies.splice(j, 1);
          spawnEnemy();
        }
        if(b.hp <= 0) {
          if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
          bullets.splice(i, 1);
          break;
        }
      }
    }
  }

  enemies.forEach(e => {
    const ecls = TANK_CLASSES[e.classId];
    if(!ecls) return;
    const d = Math.sqrt((player.x-e.x)**2 + (player.y-e.y)**2);
    if(d < pSize + ecls.bodySize * lvlMult(e)) {
      const eSize = ecls.bodySize * lvlMult(e);
      if(player.invuln <= 0) player.hp -= collisionSelfDmg(eSize, player.maxHp, player.level);
      e.hp -= collisionSelfDmg(pSize, e.maxHp, e.level);
      const ang = Math.atan2(player.y - e.y, player.x - e.x);
      player.vx += Math.cos(ang) * 3;
      player.vy += Math.sin(ang) * 3;
      e.vx -= Math.cos(ang) * 3;
      e.vy -= Math.sin(ang) * 3;
      if(e.hp <= 0) {
        addXP(e.level * 18 + 50);
        e.drones.forEach(dr => { const idx = bullets.indexOf(dr); if(idx>=0) bullets.splice(idx,1); });
        enemies.splice(enemies.indexOf(e), 1);
        spawnEnemy();
      }
      if(player.hp <= 0) die();
    }
  });

  const currentTouching = new Set();
  for(let j = foods.length-1; j >= 0; j--) {
    const f = foods[j];
    const d = Math.sqrt((player.x-f.x)**2 + (player.y-f.y)**2);
    if(d < pSize + f.size) {
      f.hp -= (cls.bodyDamage + getStatMult(2)) * 0.5;
      if(!player.touchingFoods.has(f)) {
        player.hp -= collisionSelfDmg(f.size, player.maxHp, player.level);
      }
      currentTouching.add(f);
      const kb2 = 0.04 / Math.pow(1.5, Math.log2(Math.max(1, f.size / 12)));
      f.vx += (f.x-player.x)*kb2; f.vy += (f.y-player.y)*kb2;
      if(f.hp <= 0) {
        if(f.levelUp) addLevel();
        else addXP(f.xp);
        foods.splice(j, 1);
        spawnFood();
      }
      if(player.hp <= 0) { die(); return; }
    }
  }
  player.touchingFoods = currentTouching;
}

// ==================== REMOTE PLAYER COLLISIONS ====================
function checkRemoteCollisions() {
  if(remotePlayersList.length === 0) return;
  const cls = TANK_CLASSES[player.classId];
  const pSize = cls.bodySize * lvlMult();

  // Player bullets vs remote players
  for(let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if(!b.isPlayerBullet) continue;
    for(let j = 0; j < remotePlayersList.length; j++) {
      const rp = remotePlayersList[j];
      const rcls = TANK_CLASSES[rp.classId];
      if(!rcls) continue;
      const rpLvlMult = 1 + ((rp.level || 1) - 1) * 0.025;
      const rpSize = rcls.bodySize * rpLvlMult;
      const d = Math.sqrt((b.x - rp.displayX)**2 + (b.y - rp.displayY)**2);
      if(d < b.size + rpSize) {
        addParticle(rp.displayX, rp.displayY, rp.color);
        sendDamageToRemote(rp.id, b.damage);
        b.hp -= 1;
        if(b.hp <= 0) {
          if(b.isDrone && b.owner) b.owner.drones = b.owner.drones.filter(d=>d!==b);
          bullets.splice(i, 1);
          break;
        }
      }
    }
  }

  // Player body vs remote players
  for(let j = 0; j < remotePlayersList.length; j++) {
    const rp = remotePlayersList[j];
    const rcls = TANK_CLASSES[rp.classId];
    if(!rcls) continue;
    const rpLvlMult = 1 + ((rp.level || 1) - 1) * 0.025;
    const rpSize = rcls.bodySize * rpLvlMult;
    const d = Math.sqrt((player.x - rp.displayX)**2 + (player.y - rp.displayY)**2);
    if(d < pSize + rpSize && player.invuln <= 0) {
      const ang = Math.atan2(player.y - rp.displayY, player.x - rp.displayX);
      player.vx += Math.cos(ang) * 3;
      player.vy += Math.sin(ang) * 3;
      const bodyDmg = collisionSelfDmg(rpSize, player.maxHp, player.level);
      player.hp -= bodyDmg;
      sendDamageToRemote(rp.id, collisionSelfDmg(pSize, rp.maxHp, rp.level));
      if(player.hp <= 0) {
        lastKilledBy = rp.name;
        die();
      }
    }
  }
}

function getColor(type) {
  switch(type) {
    case 'square': return COLORS.food1;
    case 'triangle': return COLORS.food2;
    case 'pentagon': return COLORS.food3;
    case 'hexagon': return COLORS.food4;
    case 'star': return COLORS.food5;
    case 'diamond': return COLORS.food6;
    case 'heptagon': return COLORS.food7;
    case 'cross': return COLORS.food8;
    case 'nonagon': return COLORS.food9;
    default: return COLORS.food4;
  }
}

function addXP(amount) {
  player.xp += amount;
  score += amount;
  while(player.xp >= player.xpNeeded && player.level < MAX_LEVEL) {
    player.xp -= player.xpNeeded;
    player.level++;
    statPoints++;
    player.xpNeeded = Math.floor(player.xpNeeded * 1.02 + 2);
    player.maxHp = (TANK_CLASSES[player.classId].maxHp + stats[1]*57.6) * lvlMultHp();
    player.hp = player.maxHp;
    buildClassUI();
    updateStatUI();
  }
}

function addLevel() {
  if(player.level >= MAX_LEVEL) { addXP(500); return; }
  player.level++;
  statPoints++;
  player.xp = 0;
  player.xpNeeded = Math.floor(player.xpNeeded * 1.02 + 2);
  player.maxHp = (TANK_CLASSES[player.classId].maxHp + stats[1]*57.6) * lvlMult();
  player.hp = player.maxHp;
  score += player.level * 20;
  buildClassUI();
  updateStatUI();
}

function die() {
  playing = false;
  document.getElementById('hud').style.display = 'none';
  document.getElementById('upgradePanel').style.display = 'none';
  document.getElementById('classPanel').style.display = 'none';
  document.getElementById('scoreDisplay').style.display = 'none';
  document.getElementById('classLabel').style.display = 'none';
  document.getElementById('minimap').style.display = 'none';
  document.getElementById('onlineCount').style.display = 'none';
  document.getElementById('leaderboard').style.display = 'none';
  document.getElementById('deathScreen').style.display = 'flex';
  document.getElementById('finalScore').textContent = 'Score: ' + score.toLocaleString();
  document.getElementById('killedBy').textContent = lastKilledBy ? 'Killed by ' + lastKilledBy : '';
  player.drones.forEach(dr => { const idx = bullets.indexOf(dr); if(idx>=0) bullets.splice(idx,1); });

  if(roomPlayersRef && myPlayerId) {
    roomPlayersRef.child(myPlayerId).remove();
  }
}

function maintainPopulation() {
  while(foods.length < 9000) spawnFood();
  const maxEnemies = offlineMode ? 25 : 15;
  while(enemies.length < maxEnemies) spawnEnemy();
}

function pushApart(a, b, aR, bR) {
  const dx = a.x - b.x, dy = a.y - b.y;
  const d = Math.sqrt(dx*dx + dy*dy);
  const minD = aR + bR;
  if(d > 0 && d < minD) {
    const overlap = (minD - d) * 0.5;
    const nx = dx/d, ny = dy/d;
    a.x += nx * overlap; a.y += ny * overlap;
    b.x -= nx * overlap; b.y -= ny * overlap;
    a.vx += nx * 0.3; a.vy += ny * 0.3;
    b.vx -= nx * 0.3; b.vy -= ny * 0.3;
  }
}

function resolveBodyCollisions() {
  for(let i = 0; i < enemies.length; i++) {
    const a = enemies[i];
    const ac = TANK_CLASSES[a.classId];
    if(!ac) continue;
    const aR = ac.bodySize * lvlMult(a);
    for(let j = i+1; j < enemies.length; j++) {
      const b = enemies[j];
      const bc = TANK_CLASSES[b.classId];
      if(!bc) continue;
      const bR = bc.bodySize * lvlMult(b);
      const dx = a.x - b.x, dy = a.y - b.y;
      if(Math.abs(dx) > aR+bR || Math.abs(dy) > aR+bR) continue;
      pushApart(a, b, aR, bR);
    }
  }

  for(let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    const ec = TANK_CLASSES[e.classId];
    if(!ec) continue;
    const eR = ec.bodySize * lvlMult(e);
    for(let j = 0; j < foods.length; j++) {
      const f = foods[j];
      const dx = e.x - f.x, dy = e.y - f.y;
      if(Math.abs(dx) > eR+f.size || Math.abs(dy) > eR+f.size) continue;
      pushApart(e, f, eR, f.size);
    }
  }

  for(let i = 0; i < foods.length; i++) {
    const a = foods[i];
    if(a.size < 30) continue;
    for(let j = i+1; j < foods.length; j++) {
      const b = foods[j];
      if(b.size < 30) continue;
      const dx = a.x - b.x, dy = a.y - b.y;
      if(Math.abs(dx) > a.size+b.size || Math.abs(dy) > a.size+b.size) continue;
      pushApart(a, b, a.size, b.size);
    }
  }
}

function updateCamera() {
  const cls = TANK_CLASSES[player.classId];
  const fov = (cls.fov || 1) * lvlMultFov();
  const targetZoom = 0.85 / fov;
  camera.x += (player.x - camera.x) * 0.08;
  camera.y += (player.y - camera.y) * 0.08;
  camera.zoom += (targetZoom - camera.zoom) * 0.05;
}

// ==================== DRAWING ====================
function draw() {
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  drawGrid();
  drawFoods();
  drawBullets();
  drawEnemies();
  drawRemotePlayers();
  drawPlayer();
  drawParticles();

  ctx.restore();
}

function drawGrid() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(WORLD_CX, WORLD_CY, WORLD_R, 0, Math.PI*2);
  ctx.clip();

  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 1;
  const l = camera.x - W/2/camera.zoom, r = camera.x + W/2/camera.zoom;
  const t = camera.y - H/2/camera.zoom, b = camera.y + H/2/camera.zoom;
  const sx = Math.floor(l/GRID_SIZE)*GRID_SIZE;
  const sy = Math.floor(t/GRID_SIZE)*GRID_SIZE;
  ctx.beginPath();
  for(let x=sx; x<=r; x+=GRID_SIZE) { ctx.moveTo(x, t); ctx.lineTo(x, b); }
  for(let y=sy; y<=b; y+=GRID_SIZE) { ctx.moveTo(l, y); ctx.lineTo(r, y); }
  ctx.stroke();
  ctx.restore();

  ctx.strokeStyle = 'rgba(0,0,0,.2)';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.arc(WORLD_CX, WORLD_CY, WORLD_R, 0, Math.PI*2);
  ctx.stroke();
}

function drawFoods() {
  foods.forEach(f => {
    if(!onScreen(f.x, f.y, f.size + 50)) return;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.angle);
    ctx.fillStyle = getColor(f.type);
    ctx.strokeStyle = darken(getColor(f.type));
    ctx.lineWidth = 2.5;

    if(f.type === 'square') drawPoly(4, f.size, Math.PI/4);
    else if(f.type === 'triangle') drawPoly(3, f.size, -Math.PI/2);
    else if(f.type === 'pentagon') drawPoly(5, f.size, -Math.PI/2);
    else if(f.type === 'star') { drawStar(8, f.size, f.size * 0.55); ctx.shadowColor = '#ff44cc'; ctx.shadowBlur = 16; }
    else if(f.type === 'diamond') drawDiamond(f.size, f.size * 1.6);
    else if(f.type === 'heptagon') drawPoly(7, f.size, -Math.PI/2);
    else if(f.type === 'cross') { drawCross(f.size); ctx.shadowColor = '#6c5ce7'; ctx.shadowBlur = 14; }
    else if(f.type === 'nonagon') { drawPoly(9, f.size, -Math.PI/2); ctx.shadowColor = '#d63031'; ctx.shadowBlur = 20; }
    else drawPoly(6, f.size, 0);

    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.rotate(-f.angle);
    if(f.hp < f.maxHp) drawHpBar(0, f.size + 8, f.size * 1.4, f.hp, f.maxHp);

    ctx.restore();
  });
}

function drawPoly(sides, radius, startAngle) {
  ctx.beginPath();
  for(let i=0; i<sides; i++) {
    const a = startAngle + (i/sides)*Math.PI*2;
    ctx.lineTo(Math.cos(a)*radius, Math.sin(a)*radius);
  }
  ctx.closePath();
}

function drawStar(points, outerR, innerR) {
  ctx.beginPath();
  for(let i = 0; i < points * 2; i++) {
    const a = -Math.PI/2 + (i / (points*2)) * Math.PI * 2;
    const r = i % 2 === 0 ? outerR : innerR;
    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath();
}

function drawDiamond(w, h) {
  ctx.beginPath();
  ctx.moveTo(0, -h);
  ctx.lineTo(w, 0);
  ctx.lineTo(0, h);
  ctx.lineTo(-w, 0);
  ctx.closePath();
}

function drawCross(size) {
  const t = size * 0.35;
  ctx.beginPath();
  ctx.moveTo(-t, -size); ctx.lineTo(t, -size);
  ctx.lineTo(t, -t); ctx.lineTo(size, -t);
  ctx.lineTo(size, t); ctx.lineTo(t, t);
  ctx.lineTo(t, size); ctx.lineTo(-t, size);
  ctx.lineTo(-t, t); ctx.lineTo(-size, t);
  ctx.lineTo(-size, -t); ctx.lineTo(-t, -t);
  ctx.closePath();
}

function drawTank(x, y, angle, classId, color, size, alpha, scaleFactor) {
  const cls = TANK_CLASSES[classId];
  if(!cls) return;
  const sf = scaleFactor || 1;
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = alpha || 1;

  cls.barrels.forEach(b => {
    ctx.save();
    ctx.rotate(angle + b.angle);
    ctx.fillStyle = COLORS.barrel;
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 2;
    const bw = b.width * sf, bl = b.length * sf;
    ctx.fillRect(0, -bw/2, bl, bw);
    ctx.strokeRect(0, -bw/2, bl, bw);
    ctx.restore();
  });

  cls.barrels.forEach(b => {
    if(!b.offset) return;
    ctx.save();
    ctx.rotate(angle + b.angle);
    ctx.fillStyle = COLORS.barrel;
    ctx.strokeStyle = '#777';
    ctx.lineWidth = 2;
    const bw = b.width * sf, bl = b.length * sf;
    ctx.fillRect(0, b.offset * sf - bw/2, bl, bw);
    ctx.strokeRect(0, b.offset * sf - bw/2, bl, bw);
    ctx.restore();
  });

  const bs = size || cls.bodySize;
  ctx.fillStyle = color;
  ctx.strokeStyle = darken(color);
  ctx.lineWidth = 3;

  if(cls.smasher) {
    ctx.save();
    ctx.rotate(angle + tick * 0.02);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 4;
    drawPoly(6, bs + 6, 0);
    ctx.stroke();
    ctx.restore();
  }
  if(cls.spike) {
    ctx.save();
    ctx.rotate(angle + tick * 0.02);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    for(let i = 0; i < 12; i++) {
      const a = (i/12)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*bs*0.8, Math.sin(a)*bs*0.8);
      ctx.lineTo(Math.cos(a)*(bs+10), Math.sin(a)*(bs+10));
      ctx.stroke();
    }
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(0, 0, bs, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();

  ctx.restore();
}

function drawPlayer() {
  const cls = TANK_CLASSES[player.classId];
  const alpha = player.invuln > 0 ? 0.5 + Math.sin(tick*0.3)*0.3 : 1;
  const pDrawSize = cls.bodySize * lvlMult();
  drawTank(player.x, player.y, player.angle, player.classId, COLORS.player, pDrawSize, alpha, lvlMult());

  ctx.fillStyle = '#333';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(player.name, player.x, player.y - pDrawSize - 18);
  ctx.fillStyle = '#666';
  ctx.font = '11px sans-serif';
  ctx.fillText('Lv ' + player.level + ' ' + TANK_CLASSES[player.classId].name, player.x, player.y - pDrawSize - 6);

  if(player.hp < player.maxHp) drawHpBar(player.x, player.y + pDrawSize + 10, pDrawSize * 1.5, player.hp, player.maxHp);
}

function drawEnemies() {
  enemies.forEach(e => {
    if(!onScreen(e.x, e.y, 80)) return;
    const ecls = TANK_CLASSES[e.classId];
    if(!ecls) return;
    const eDrawSize = ecls.bodySize * lvlMult(e);
    drawTank(e.x, e.y, e.angle, e.classId, COLORS.enemy, eDrawSize, 1, lvlMult(e));

    ctx.fillStyle = '#333';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(e.name, e.x, e.y - eDrawSize - 16);
    ctx.fillStyle = '#777';
    ctx.font = '10px sans-serif';
    ctx.fillText('Lv ' + e.level + ' ' + ecls.name, e.x, e.y - eDrawSize - 5);

    if(e.hp < e.maxHp) drawHpBar(e.x, e.y + eDrawSize + 10, eDrawSize * 1.5, e.hp, e.maxHp);
  });
}

function drawRemotePlayers() {
  remotePlayersList.forEach(rp => {
    if(!onScreen(rp.displayX, rp.displayY, 80)) return;
    const rcls = TANK_CLASSES[rp.classId];
    if(!rcls) return;
    const rpLvlMult = 1 + ((rp.level || 1) - 1) * 0.025;
    const rpSize = rcls.bodySize * rpLvlMult;
    drawTank(rp.displayX, rp.displayY, rp.displayAngle, rp.classId, rp.color, rpSize, 1, rpLvlMult);

    ctx.fillStyle = '#333';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(rp.name, rp.displayX, rp.displayY - rpSize - 18);
    ctx.fillStyle = rp.color;
    ctx.font = '10px sans-serif';
    ctx.fillText('Lv ' + rp.level + ' ' + rcls.name, rp.displayX, rp.displayY - rpSize - 6);

    if(rp.hp < rp.maxHp) drawHpBar(rp.displayX, rp.displayY + rpSize + 10, rpSize * 1.5, rp.hp, rp.maxHp);
  });
}

function drawBullets() {
  bullets.forEach(b => {
    if(!onScreen(b.x, b.y, 30)) return;
    const color = b.isPlayerBullet ? COLORS.player : COLORS.enemy;
    ctx.fillStyle = color;
    ctx.strokeStyle = darken(color);
    ctx.lineWidth = 2;
    if(b.trap) {
      ctx.save();
      ctx.translate(b.x, b.y);
      drawPoly(3, b.size * 1.3, -Math.PI/2);
      ctx.fill(); ctx.stroke();
      ctx.restore();
    } else if(b.isDrone) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(Math.atan2(b.vy, b.vx));
      drawPoly(3, b.size, 0);
      ctx.fill(); ctx.stroke();
      ctx.restore();
    } else {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
    }
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * (p.life/p.maxLife), 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawHpBar(x, y, w, hp, maxHp) {
  ctx.fillStyle = 'rgba(0,0,0,.25)';
  ctx.fillRect(x - w, y, w * 2, 5);
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(x - w, y, w * 2 * Math.max(0, hp/maxHp), 5);
}

function onScreen(x, y, margin) {
  const sx = (x - camera.x) * camera.zoom + W/2;
  const sy = (y - camera.y) * camera.zoom + H/2;
  return sx > -margin && sx < W + margin && sy > -margin && sy < H + margin;
}

function darken(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'rgb(' + Math.floor(r*0.7) + ',' + Math.floor(g*0.7) + ',' + Math.floor(b*0.7) + ')';
}

// ==================== MINIMAP ====================
function drawMinimap() {
  const mmSize = 140, mmR = mmSize/2;
  const s = mmSize / (WORLD_R * 2);
  mmCtx.clearRect(0, 0, mmSize, mmSize);

  mmCtx.save();
  mmCtx.beginPath();
  mmCtx.arc(mmR, mmR, mmR, 0, Math.PI*2);
  mmCtx.clip();

  mmCtx.fillStyle = 'rgba(200,200,200,.6)';
  mmCtx.fill();

  mmCtx.fillStyle = 'rgba(180,180,180,.5)';
  foods.forEach(f => {
    mmCtx.fillRect((f.x - WORLD_CX + WORLD_R)*s, (f.y - WORLD_CY + WORLD_R)*s, 1.5, 1.5);
  });

  enemies.forEach(e => {
    mmCtx.fillStyle = e.level === 1000 ? '#000' : COLORS.enemy;
    mmCtx.beginPath();
    mmCtx.arc((e.x - WORLD_CX + WORLD_R)*s, (e.y - WORLD_CY + WORLD_R)*s, e.level === 1000 ? 4 : 2.5, 0, Math.PI*2);
    mmCtx.fill();
  });

  // Remote players on minimap
  remotePlayersList.forEach(rp => {
    mmCtx.fillStyle = rp.color;
    mmCtx.beginPath();
    mmCtx.arc((rp.displayX - WORLD_CX + WORLD_R)*s, (rp.displayY - WORLD_CY + WORLD_R)*s, 3, 0, Math.PI*2);
    mmCtx.fill();
  });

  mmCtx.fillStyle = COLORS.player;
  mmCtx.beginPath();
  mmCtx.arc((player.x - WORLD_CX + WORLD_R)*s, (player.y - WORLD_CY + WORLD_R)*s, 3.5, 0, Math.PI*2);
  mmCtx.fill();

  mmCtx.restore();

  mmCtx.strokeStyle = 'rgba(0,0,0,.3)';
  mmCtx.lineWidth = 1.5;
  mmCtx.beginPath();
  mmCtx.arc(mmR, mmR, mmR - 1, 0, Math.PI*2);
  mmCtx.stroke();
}

// ==================== HUD ====================
function updateHUD() {
  const pct = player.level >= MAX_LEVEL ? 100 : (player.xp / player.xpNeeded * 100);
  document.getElementById('xpBar').style.width = pct + '%';
  document.getElementById('scoreDisplay').textContent = 'Score: ' + score.toLocaleString();
  document.getElementById('classLabel').textContent = TANK_CLASSES[player.classId].name;
  document.getElementById('hudLevel').textContent = 'Lv ' + player.level + ' | ' + statPoints + ' pts';

  if(!offlineMode) {
    const online = remotePlayersList.length + 1;
    document.getElementById('onlineCount').textContent = online + ' player' + (online !== 1 ? 's' : '') + ' online';
  }
}

// ==================== LEADERBOARD ====================
function updateLeaderboard() {
  if(offlineMode) return;
  const entries = [];
  entries.push({ name: player.name, score: score, me: true });
  remotePlayersList.forEach(rp => {
    entries.push({ name: rp.name, score: rp.score || 0, me: false });
  });
  entries.sort((a, b) => b.score - a.score);
  const top = entries.slice(0, 10);

  const container = document.getElementById('lbEntries');
  container.innerHTML = '';
  top.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'lb-entry' + (e.me ? ' me' : '');
    div.innerHTML = '<span>' + (i+1) + '. ' + e.name + '</span><span>' + e.score.toLocaleString() + '</span>';
    container.appendChild(div);
  });
}

// ==================== START ====================
gameLoop();
</script>
