<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WidR Party</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231A1A2E'/%3E%3Ctext x='32' y='44' font-family='Arial' font-weight='900' font-size='36' fill='%23F5C518' text-anchor='middle'%3EW%3C/text%3E%3Crect x='12' y='48' width='40' height='4' rx='2' fill='%23E94560'/%3E%3C/svg%3E">
<style>
:root{--primary:#1A1A2E;--accent:#E94560;--gold:#F5C518;--blue:#0F3460;--mint:#16C79A;--purple:#845EC2;--orange:#FF9A3C;--bg:#0d0d1a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:white;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 50%,rgba(15,52,96,0.4) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(233,69,96,0.15) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(132,94,194,0.15) 0%,transparent 50%);z-index:-1;}
.particles{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;overflow:hidden;}
.particle{position:absolute;width:4px;height:4px;background:rgba(245,197,24,0.2);border-radius:50%;animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-10vh);opacity:0;}}
.screen{display:none;min-height:100vh;padding:20px;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}
.lobby{text-align:center;max-width:500px;width:100%;}
.lobby h1{font-size:3.5rem;font-weight:900;letter-spacing:-2px;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.lobby-sub{color:rgba(255,255,255,0.4);margin-bottom:40px;font-size:0.95rem;}
.btn{display:block;width:100%;padding:18px;border:none;border-radius:14px;font-size:1rem;font-weight:800;cursor:pointer;margin-bottom:12px;transition:all 0.3s;text-transform:uppercase;letter-spacing:1.5px;}
.btn:hover{transform:translateY(-3px);}
.btn-primary{background:linear-gradient(135deg,var(--accent),#c73450);color:white;box-shadow:0 4px 20px rgba(233,69,96,0.3);}
.btn-secondary{background:rgba(255,255,255,0.06);color:white;border:2px solid rgba(255,255,255,0.1);}
.input{width:100%;padding:16px;border:2px solid rgba(255,255,255,0.1);border-radius:14px;font-size:1.2rem;font-family:inherit;text-align:center;letter-spacing:8px;font-weight:800;background:rgba(255,255,255,0.05);color:white;margin-bottom:12px;}
.input:focus{outline:none;border-color:var(--gold);}
.input::placeholder{color:rgba(255,255,255,0.2);}
.code-display{font-size:3rem;font-weight:900;color:var(--gold);letter-spacing:8px;background:rgba(245,197,24,0.08);border:2px solid rgba(245,197,24,0.2);padding:20px 40px;border-radius:16px;margin:20px 0;display:inline-block;}
.player-item{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06);border-radius:14px;margin-bottom:8px;}
.player-item .name{font-weight:700;flex:1;color:rgba(255,255,255,0.8);}
.char-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:500px;width:100%;margin:24px 0;}
.char-card{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px 8px;text-align:center;cursor:pointer;transition:all 0.3s;}
.char-card:hover{transform:translateY(-6px);border-color:rgba(255,255,255,0.15);}
.char-card.sel{border-color:var(--gold);background:rgba(245,197,24,0.1);box-shadow:0 0 24px rgba(245,197,24,0.2);}
.char-card.taken{opacity:0.2;cursor:not-allowed;}
.char-card .emoji{font-size:2.5rem;margin-bottom:8px;}
.char-card .cname{font-size:0.7rem;font-weight:700;color:rgba(255,255,255,0.5);}
.school-bg{background:linear-gradient(180deg,#2a1a0e,#3d2815,#4a3420);border-radius:20px;padding:24px;position:relative;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,0.5);}
.school-bg::before{content:'';position:absolute;top:0;left:0;right:0;height:50px;background:linear-gradient(180deg,#8B0000,#6B0000);border-radius:20px 20px 0 0;}
.school-bg::after{content:'🏫 WidR School';position:absolute;top:12px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.9);font-size:0.85rem;font-weight:800;letter-spacing:3px;z-index:1;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;position:relative;z-index:3;}
.turn-badge{background:linear-gradient(135deg,var(--accent),#c73450);padding:10px 24px;border-radius:100px;font-weight:800;font-size:0.85rem;}
.turn-badge span{color:var(--gold);}
.board{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:60px 10px 20px;position:relative;z-index:3;}
.space{background:rgba(255,240,220,0.08);border:1px solid rgba(255,240,220,0.08);border-radius:10px;padding:8px 4px 12px;text-align:center;min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-size:0.7rem;font-weight:700;transition:all 0.3s;box-shadow:0 4px 0 rgba(0,0,0,0.4);}
.space.blue{background:rgba(74,144,217,0.2);color:#8ec5ff;}
.space.red{background:rgba(233,69,96,0.2);color:#ff8ea5;}
.space.green{background:rgba(22,199,154,0.2);color:#5ee8c5;}
.space.star{background:rgba(245,197,24,0.2);color:var(--gold);}
.space.mini{background:rgba(132,94,194,0.2);color:#c4a8f0;}
.space.cur{box-shadow:0 4px 0 rgba(245,197,24,0.5),0 0 0 2px var(--gold);transform:translateY(-4px);z-index:4;}
.space .icon{font-size:1.2rem;}
.space .txt{font-size:0.5rem;text-transform:uppercase;letter-spacing:1px;opacity:0.7;}
.space .pls{display:flex;gap:2px;justify-content:center;margin-top:2px;font-size:1.2rem;}
.scores{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.sc{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px 18px;flex:1;min-width:120px;display:flex;align-items:center;gap:10px;}
.sc.act{border-color:var(--gold);box-shadow:0 0 20px rgba(245,197,24,0.15);}
.sc .e{font-size:1.6rem;}.sc .n{font-size:0.72rem;font-weight:700;color:rgba(255,255,255,0.4);}
.sc .s{display:flex;gap:12px;font-size:0.82rem;font-weight:800;}
.dice-box{text-align:center;margin:20px 0;}
.dice{width:100px;height:100px;background:linear-gradient(135deg,#fff,#eee);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:3rem;font-weight:900;color:var(--primary);box-shadow:0 8px 0 rgba(0,0,0,0.15),0 12px 40px rgba(0,0,0,0.3);margin-bottom:16px;position:relative;}
.dice.roll{animation:dr 0.12s infinite;}
@keyframes dr{0%{transform:rotate(0) scale(1.05);}50%{transform:rotate(8deg) scale(0.95);}100%{transform:rotate(-8deg) scale(1.05);}}
.dice .bonus{position:absolute;top:-8px;right:-8px;background:var(--mint);color:white;font-size:0.6rem;font-weight:800;padding:3px 8px;border-radius:100px;}
.roll-btn{padding:18px 56px;background:linear-gradient(135deg,var(--gold),var(--orange));color:var(--primary);border:none;border-radius:16px;font-size:1.1rem;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:2px;transition:all 0.3s;box-shadow:0 6px 0 rgba(0,0,0,0.15);}
.roll-btn:hover{transform:translateY(-3px);}
.roll-btn:disabled{opacity:0.2;cursor:not-allowed;transform:none;}
.mini-box{text-align:center;max-width:500px;width:100%;}
.mini-title{font-size:1.8rem;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.mini-desc{color:rgba(255,255,255,0.4);margin-bottom:24px;font-size:0.9rem;}
.mini-area{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:40px;min-height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;overflow:hidden;margin-bottom:20px;}
.mini-area .mscore{font-size:3.5rem;font-weight:900;color:var(--gold);}
.mini-area .mtimer{font-size:1.4rem;font-weight:800;color:var(--accent);}
.gover{text-align:center;max-width:500px;width:100%;}
.gover .crown{font-size:5rem;animation:bounce 1s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.gover .winner{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.rrow{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.06);border-radius:14px;margin-bottom:8px;}
.rrow:first-child{background:linear-gradient(135deg,rgba(245,197,24,0.15),rgba(255,154,60,0.1));border-color:rgba(245,197,24,0.2);}
.event-log{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;}
.event-msg{background:linear-gradient(135deg,var(--primary),var(--blue));color:white;padding:12px 28px;border-radius:100px;font-size:0.85rem;font-weight:700;margin-bottom:8px;animation:eIn 0.3s ease,eOut 0.5s ease 2s forwards;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
@keyframes eIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes eOut{to{opacity:0;transform:translateY(-20px);}}
.back{position:fixed;top:16px;left:16px;color:rgba(255,255,255,0.3);text-decoration:none;font-weight:700;font-size:0.85rem;z-index:50;}
.back:hover{color:var(--gold);}
@media(max-width:600px){.char-grid{grid-template-columns:repeat(3,1fr);}.board{grid-template-columns:repeat(4,1fr);gap:4px;}.space{padding:6px 2px 10px;min-height:48px;}.scores{gap:6px;}.sc{min-width:80px;padding:10px;}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<a href="index.html" class="back">← Terug naar site</a>
<div class="event-log" id="eventLog"></div>

<div class="screen active" id="sLobby">
<div class="lobby">
  <h1>WidR Party</h1>
  <div class="lobby-sub">De ultieme groeps game — Mario Party style</div>
  <input class="input" id="nameIn" placeholder="Jouw naam" style="letter-spacing:2px;text-transform:none;margin-bottom:24px;">
  <button class="btn btn-primary" onclick="createRoom()">🎮 Maak Room</button>
  <button class="btn btn-secondary" onclick="document.getElementById('joinBox').style.display='block'">🔗 Join Room</button>
  <div id="joinBox" style="display:none;margin-top:20px;">
    <input class="input" id="codeIn" placeholder="CODE" maxlength="5">
    <button class="btn btn-primary" onclick="joinRoom()">Join</button>
  </div>
</div>
</div>

<div class="screen" id="sWait">
<div class="lobby">
  <h1>Room</h1>
  <div class="code-display" id="codeDisp">-----</div>
  <div class="lobby-sub">Deel deze code met je vrienden</div>
  <div id="waitList"></div>
  <div id="waitText" style="color:rgba(255,255,255,0.3);font-size:0.85rem;margin:16px 0;"></div>
  <button class="btn btn-primary" id="startBtn" onclick="startGame()" style="display:none;">🚀 Start Game</button>
</div>
</div>

<div class="screen" id="sChar">
<div class="lobby">
  <h1>Kies Character</h1>
  <div class="lobby-sub">Selecteer je personage</div>
  <div class="char-grid" id="charGrid"></div>
  <button class="btn btn-primary" id="charBtn" onclick="confirmChar()" style="display:none;">Bevestig</button>
</div>
</div>

<div class="screen" id="sBoard">
<div style="width:100%;max-width:820px;">
  <div class="scores" id="scoreCards"></div>
  <div class="school-bg">
    <div class="top-bar">
      <div class="turn-badge" id="turnBadge">Beurt: <span>-</span></div>
      <div style="font-size:0.75rem;color:rgba(255,255,255,0.4);font-weight:700;">Ronde <span id="roundN">1</span>/10</div>
    </div>
    <div class="board" id="boardEl"></div>
  </div>
  <div class="dice-box">
    <div class="dice" id="diceEl">?<span class="bonus" id="bonusEl" style="display:none;"></span></div><br>
    <button class="roll-btn" id="rollBtn" onclick="rollDice()">🎲 Gooi!</button>
  </div>
</div>
</div>

<div class="screen" id="sMini">
<div class="mini-box">
  <div class="mini-title" id="mTitle">Minigame</div>
  <div class="mini-desc" id="mDesc">-</div>
  <div class="mini-area" id="mArea"></div>
  <div id="mCtrl"></div>
</div>
</div>

<div class="screen" id="sEnd">
<div class="gover">
  <div class="crown">🏆</div>
  <div class="winner" id="winnerName">-</div>
  <div class="lobby-sub">Winnaar van WidR Party!</div>
  <div id="endList" style="margin:20px 0;"></div>
  <button class="btn btn-primary" onclick="location.reload()">🔄 Opnieuw</button>
  <a href="index.html" class="btn btn-secondary" style="text-decoration:none;text-align:center;margin-top:8px;">← Terug</a>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
try{firebase.initializeApp({apiKey:"AIzaSyBIQwVxZhUnb_bH5DiTIEADSxGzTc6Iljg",authDomain:"wat-in-de-ranking-rankings.firebaseapp.com",projectId:"wat-in-de-ranking-rankings",storageBucket:"wat-in-de-ranking-rankings.firebasestorage.app",messagingSenderId:"138866882601",appId:"1:138866882601:web:eee27036c5d95bdbc2c438"});}catch(e){}
var db=firebase.firestore(),roomRef=null,unsub=null;
var chars=[{id:'josh',n:'Josh',e:'👑'},{id:'lors',n:'Lors',e:'🃏'},{id:'fionn',n:'Fionn',e:'😑'},{id:'nath',n:'Nathan',e:'😤'},{id:'reshman',n:'Reshman',e:'🌀'},{id:'daniel',n:'Daniël',e:'💀'},{id:'milo',n:'Milo',e:'🧊'},{id:'adam',n:'Adam',e:'🎯'},{id:'metaai',n:'Meta AI',e:'🤖'},{id:'maciek',n:'Maciek',e:'⚡'},{id:'denize',n:'Denize',e:'🌙'},{id:'sichen',n:'Sichen',e:'🔮'}];
var spaces=[{t:'blue',i:'🪙',l:'+3'},{t:'green',i:'🎁',l:'bonus'},{t:'blue',i:'🪙',l:'+3'},{t:'mini',i:'🎮',l:'game'},{t:'blue',i:'🪙',l:'+3'},{t:'red',i:'💢',l:'-2'},{t:'star',i:'⭐',l:'ster'},{t:'blue',i:'🪙',l:'+3'},{t:'green',i:'🎁',l:'bonus'},{t:'blue',i:'🪙',l:'+3'},{t:'red',i:'💢',l:'-2'},{t:'mini',i:'🎮',l:'game'},{t:'blue',i:'🪙',l:'+3'},{t:'star',i:'⭐',l:'ster'},{t:'green',i:'🎁',l:'bonus'},{t:'blue',i:'🪙',l:'+3'},{t:'mini',i:'🎮',l:'game'},{t:'red',i:'💢',l:'-2'},{t:'blue',i:'🪙',l:'+3'},{t:'green',i:'🎁',l:'bonus'},{t:'star',i:'⭐',l:'ster'},{t:'blue',i:'🪙',l:'+3'},{t:'red',i:'💢',l:'-2'},{t:'mini',i:'🎮',l:'game'}];
var myId='',myName='',roomCode='',gs=null,selChar=null,isHost=false,mt=null;

function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function evt(m){var d=document.createElement('div');d.className='event-msg';d.textContent=m;document.getElementById('eventLog').appendChild(d);setTimeout(function(){d.remove();},2500);}
function getChar(id){return chars.find(function(c){return c.id===id;})||{e:'👤',n:'?'};}

function createRoom(){myName=document.getElementById('nameIn').value.trim();if(!myName){alert('Vul je naam in!');return;}myId='p_'+Math.random().toString(36).substr(2,6);roomCode=Math.random().toString(36).substr(2,5).toUpperCase();isHost=true;var d={code:roomCode,host:myId,state:'wait',round:1,turn:0,players:{},charsTaken:{},currentMini:null,miniResults:{}};d.players[myId]={name:myName,char:null,pos:0,stars:0,coins:10,db:0,ready:false};db.collection('games').doc(roomCode).set(d).then(function(){roomRef=db.collection('games').doc(roomCode);listen();show('sWait');document.getElementById('codeDisp').textContent=roomCode;});}
function joinRoom(){myName=document.getElementById('nameIn').value.trim();if(!myName){alert('Vul je naam in!');return;}var c=document.getElementById('codeIn').value.trim().toUpperCase();if(!c)return;myId='p_'+Math.random().toString(36).substr(2,6);db.collection('games').doc(c).get().then(function(doc){if(!doc.exists){alert('Room niet gevonden!');return;}roomCode=c;roomRef=db.collection('games').doc(roomCode);var u={};u['players.'+myId]={name:myName,char:null,pos:0,stars:0,coins:10,db:0,ready:false};roomRef.update(u).then(function(){listen();show('sWait');document.getElementById('codeDisp').textContent=roomCode;});});}
function listen(){if(unsub)unsub();unsub=roomRef.onSnapshot(function(doc){if(!doc.exists)return;gs=doc.data();onChange();});}
function onChange(){if(!gs)return;if(gs.state==='wait')rWait();else if(gs.state==='chars')rChars();else if(gs.state==='board')rBoard();else if(gs.state==='mini')rMini();else if(gs.state==='end')rEnd();}

function rWait(){show('sWait');var k=Object.keys(gs.players);document.getElementById('waitList').innerHTML=k.map(function(id){return '<div class="player-item"><span style="font-size:1.5rem;">👤</span><span class="name">'+gs.players[id].name+(id===myId?' (jij)':'')+'</span></div>';}).join('');document.getElementById('waitText').textContent=k.length+'/4 spelers';document.getElementById('startBtn').style.display=isHost&&k.length>=2?'block':'none';}
function startGame(){roomRef.update({state:'chars'});}

function rChars(){show('sChar');var tk=gs.charsTaken||{},tv=Object.values(tk);document.getElementById('charGrid').innerHTML=chars.map(function(c){var t=tv.indexOf(c.id)!==-1&&tk[myId]!==c.id,m=tk[myId]===c.id;return '<div class="char-card'+(m?' sel':'')+(t?' taken':'')+'" onclick="'+(t?'':'pickChar(\''+c.id+'\')')+'"><div class="emoji">'+c.e+'</div><div class="cname">'+c.n+'</div></div>';}).join('');document.getElementById('charBtn').style.display=tk[myId]?'block':'none';var all=true;Object.keys(gs.players).forEach(function(id){if(!gs.players[id].ready)all=false;});if(all&&Object.keys(gs.players).length>=2&&isHost)roomRef.update({state:'board'});}
function pickChar(id){selChar=id;var u={};u['charsTaken.'+myId]=id;roomRef.update(u);}
function confirmChar(){if(!selChar)return;var u={};u['players.'+myId+'.char']=selChar;u['players.'+myId+'.ready']=true;roomRef.update(u);}

function rBoard(){show('sBoard');var p=gs.players,k=Object.keys(p),tid=k[gs.turn%k.length],tp=p[tid];
document.getElementById('scoreCards').innerHTML=k.map(function(id){var pl=p[id],c=getChar(pl.char);return '<div class="sc'+(id===tid?' act':'')+'"><div class="e">'+c.e+'</div><div><div class="n">'+pl.name+(id===myId?' (jij)':'')+'</div><div class="s"><span style="color:var(--gold);">⭐'+pl.stars+'</span><span style="color:var(--orange);">🪙'+pl.coins+'</span>'+(pl.db>0?'<span style="color:var(--mint);font-size:0.65rem;">+'+pl.db+'🎲</span>':'')+'</div></div></div>';}).join('');
document.getElementById('turnBadge').innerHTML='Beurt: <span>'+tp.name+'</span>';
document.getElementById('roundN').textContent=Math.floor(gs.turn/k.length)+1;
document.getElementById('boardEl').innerHTML=spaces.map(function(sp,i){var here=k.filter(function(id){return p[id].pos===i;});return '<div class="space '+sp.t+(here.indexOf(tid)!==-1?' cur':'')+'"><div class="icon">'+sp.i+'</div><div class="txt">'+sp.l+'</div><div class="pls">'+here.map(function(id){return getChar(p[id].char).e;}).join('')+'</div></div>';}).join('');
var my=tid===myId,mb=p[myId]?p[myId].db||0:0;document.getElementById('rollBtn').disabled=!my;document.getElementById('rollBtn').textContent=my?'🎲 Gooi!':'Wachten...';document.getElementById('bonusEl').textContent=mb>0?'+'+mb:'';document.getElementById('bonusEl').style.display=mb>0?'block':'none';
if(Math.floor(gs.turn/k.length)>=10&&isHost)roomRef.update({state:'end'});}

function rollDice(){var btn=document.getElementById('rollBtn'),d=document.getElementById('diceEl');btn.disabled=true;d.classList.add('roll');var mb=(gs.players[myId]&&gs.players[myId].db)||0,mx=Math.min(10,6+mb),r=Math.floor(Math.random()*mx)+1,c=0;var iv=setInterval(function(){d.childNodes[0].textContent=Math.floor(Math.random()*mx)+1;c++;if(c>15){clearInterval(iv);d.classList.remove('roll');d.childNodes[0].textContent=r;doMove(r);}},80);}

function doMove(r){var p=gs.players,k=Object.keys(p),cid=k[gs.turn%k.length];if(cid!==myId)return;var pl=p[cid],np=(pl.pos+r)%spaces.length,sp=spaces[np],u={};
u['players.'+myId+'.pos']=np;u['players.'+myId+'.db']=0;u.turn=gs.turn+1;
if(sp.t==='blue'){u['players.'+myId+'.coins']=pl.coins+3;evt('+3 coins!');}
else if(sp.t==='red'){u['players.'+myId+'.coins']=Math.max(0,pl.coins-2);evt('-2 coins!');}
else if(sp.t==='green'){var b=Math.floor(Math.random()*5)+1;u['players.'+myId+'.coins']=pl.coins+b;evt('Bonus! +'+b);}
else if(sp.t==='star'){if(pl.coins>=10){u['players.'+myId+'.stars']=pl.stars+1;u['players.'+myId+'.coins']=pl.coins-10;evt('⭐ Ster!');}else evt('Niet genoeg coins (10 nodig)');}
else if(sp.t==='mini'){u.currentMini=Math.floor(Math.random()*10);u.miniResults={};setTimeout(function(){roomRef.update({state:'mini'});},1500);evt('🎮 Minigame!');}
roomRef.update(u);}

// === MINIGAMES ===
var minis=[
{t:'🔴 Bumper Balls',d:'Ontwijkt de bumpers! Beweeg met je muis/vinger.',fn:mgBumper},
{t:'📖 Booksquirm',d:'Vind het gat in de pagina voordat je geplet wordt!',fn:mgBook},
{t:'🍄 Mushroom Mix-Up',d:'Spring op de juiste kleur paddenstoel!',fn:mgMushroom},
{t:'🏃 Dungeon Run',d:'Spring over obstakels! Klik/tap om te springen.',fn:mgDungeon},
{t:'⬡ Hexagon Heat',d:'Spring naar de hexagon met de juiste kleur!',fn:mgHexagon},
{t:'🐧 Pushy Penguins',d:'Ontwijkt de pinguïns! Beweeg om te overleven.',fn:mgPenguins},
{t:'📸 Slaparazzi',d:'Blijf in het midden van de foto!',fn:mgSlaparazzi},
{t:'👹 Face Lift',d:'Match het gezicht met de sliders!',fn:mgFaceLift},
{t:'💣 Bowser\'s Blast',d:'Kies een knop... 4 veilig, 1 explodeert!',fn:mgBowser},
{t:'✏️ Trace Race',d:'Klik de checkpoints in volgorde!',fn:mgTrace}
];

function rMini(){show('sMini');var m=minis[(gs.currentMini||0)%minis.length];document.getElementById('mTitle').textContent=m.t;document.getElementById('mDesc').textContent=m.d;
if(gs.miniResults&&gs.miniResults[myId]!==undefined){document.getElementById('mArea').innerHTML='<div class="mscore">'+gs.miniResults[myId]+'</div><div style="color:rgba(255,255,255,0.4);margin-top:8px;">Wachten op anderen...</div>';document.getElementById('mCtrl').innerHTML='';chkMini();return;}
m.fn();}

function chkMini(){if(!gs.miniResults)return;var k=Object.keys(gs.players);if(!k.every(function(id){return gs.miniResults[id]!==undefined;}))return;if(!isHost)return;var best=null,bs=-1,sec=null,ss=-1;k.forEach(function(id){var s=gs.miniResults[id];if(s>bs){sec=best;ss=bs;best=id;bs=s;}else if(s>ss){sec=id;ss=s;}});var u={};u['players.'+best+'.db']=3;u['players.'+best+'.coins']=(gs.players[best].coins||0)+5;if(sec)u['players.'+sec+'.db']=1;u.state='board';roomRef.update(u);evt('🥇 '+gs.players[best].name+' wint! +5🪙 +3🎲');}
function subScore(s){var u={};u['miniResults.'+myId]=s;roomRef.update(u);}

// 1. BUMPER BALLS
function mgBumper(){var a=document.getElementById('mArea');a.style.position='relative';a.style.minHeight='300px';var sc=0,tl=8,px=50,py=50,bs=[];
a.onmousemove=function(e){var r=a.getBoundingClientRect();px=((e.clientX-r.left)/r.width)*100;py=((e.clientY-r.top)/r.height)*100;};
a.ontouchmove=function(e){e.preventDefault();var t=e.touches[0],r=a.getBoundingClientRect();px=((t.clientX-r.left)/r.width)*100;py=((t.clientY-r.top)/r.height)*100;};
var gl=setInterval(function(){if(Math.random()<0.15)bs.push({x:Math.random()*80+10,y:-5,s:20+Math.random()*20,v:1+Math.random()*2});bs.forEach(function(b){b.y+=b.v;});bs=bs.filter(function(b){return b.y<110;});if(bs.some(function(b){return Math.abs(b.x-px)<8&&Math.abs(b.y-py)<8;})){end();}sc++;render();},60);
mt=setInterval(function(){tl-=0.1;if(tl<=0)end();},100);
function render(){a.innerHTML='<div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);font-weight:800;color:var(--accent);">'+tl.toFixed(1)+'</div><div style="position:absolute;top:8px;right:16px;font-weight:800;color:var(--gold);">'+sc+'</div><div style="position:absolute;left:'+px+'%;top:'+py+'%;transform:translate(-50%,-50%);font-size:1.5rem;z-index:5;">😀</div>'+bs.map(function(b){return '<div style="position:absolute;left:'+b.x+'%;top:'+b.y+'%;width:'+b.s+'px;height:'+b.s+'px;background:var(--accent);border-radius:50%;transform:translate(-50%,-50%);">🔴</div>';}).join('');}
function end(){clearInterval(gl);clearInterval(mt);a.style.position='';a.style.minHeight='';a.onmousemove=null;a.ontouchmove=null;subScore(sc);}
document.getElementById('mCtrl').innerHTML='';render();}

// 2. BOOKSQUIRM
function mgBook(){var a=document.getElementById('mArea'),sc=0,rd=0;
function np(){if(rd>=8){subScore(sc);return;}rd++;var cols=3+Math.min(rd,3),hole=Math.floor(Math.random()*cols*2);a.innerHTML='<div style="font-size:0.8rem;color:rgba(255,255,255,0.4);">Pagina '+rd+'/8 — Score: '+sc+'</div><div style="font-size:0.9rem;color:var(--accent);font-weight:700;margin:8px 0;">📖 Vind het gat!</div><div style="display:grid;grid-template-columns:repeat('+cols+',1fr);gap:6px;">'+Array.from({length:cols*2},function(_,i){return i===hole?'<button onclick="window._bh(true)" style="height:50px;background:rgba(0,0,0,0.4);border:2px dashed rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;font-size:1.2rem;">🕳️</button>':'<button onclick="window._bh(false)" style="height:50px;background:rgba(139,90,43,0.4);border:1px solid rgba(139,90,43,0.3);border-radius:8px;cursor:pointer;">📄</button>';}).join('')+'</div>';mt=setTimeout(function(){sc=Math.max(0,sc-5);np();},Math.max(1000,4000-rd*400));}
window._bh=function(c){clearTimeout(mt);sc+=c?15:-5;sc=Math.max(0,sc);np();};np();document.getElementById('mCtrl').innerHTML='';}

// 3. MUSHROOM MIX-UP
function mgMushroom(){var a=document.getElementById('mArea'),colors=['#E94560','#4A90D9','#16C79A','#F5C518','#845EC2','#FF9A3C'],names=['Rood','Blauw','Groen','Geel','Paars','Oranje'],sc=0,rd=0;
function nr(){if(rd>=8){subScore(sc);return;}rd++;var cnt=Math.min(6,3+Math.floor(rd/2)),tg=Math.floor(Math.random()*cnt);a.innerHTML='<div style="font-size:0.8rem;color:rgba(255,255,255,0.4);">Ronde '+rd+' — Score: '+sc+'</div><div style="font-size:1.5rem;font-weight:900;margin:12px 0;">🍄 <span style="color:'+colors[tg]+';">'+names[tg]+'</span>!</div><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px;">'+colors.slice(0,cnt).map(function(c,i){return '<button onclick="window._mp('+i+','+tg+')" style="width:65px;height:65px;background:'+c+';border:none;border-radius:50%;cursor:pointer;font-size:1.5rem;box-shadow:0 6px 0 rgba(0,0,0,0.2);">🍄</button>';}).join('')+'</div>';mt=setTimeout(function(){sc=Math.max(0,sc-5);nr();},Math.max(800,3000-rd*250));}
window._mp=function(p,t){clearTimeout(mt);sc+=p===t?12:-5;sc=Math.max(0,sc);nr();};nr();document.getElementById('mCtrl').innerHTML='';}

// 4. DUNGEON RUN
function mgDungeon(){var a=document.getElementById('mArea');a.style.position='relative';a.style.minHeight='250px';a.style.overflow='hidden';var sc=0,jp=false,ov=false,obs=[];
a.onclick=function(){if(!jp&&!ov){jp=true;setTimeout(function(){jp=false;},600);}};
var gl=setInterval(function(){if(ov)return;sc++;if(Math.random()<0.04+sc*0.0005)obs.push({x:105,e:['🧱','🔥','⛏️','💀'][Math.floor(Math.random()*4)]});obs.forEach(function(o){o.x-=2;});if(obs.some(function(o){return o.x>10&&o.x<20&&!jp;})){ov=true;clearInterval(gl);a.style.position='';a.style.minHeight='';a.onclick=null;subScore(sc);}obs=obs.filter(function(o){return o.x>-10;});a.innerHTML='<div style="position:absolute;top:8px;right:16px;font-weight:800;color:var(--gold);">'+sc+'m</div><div style="position:absolute;bottom:'+(jp?'45':'20')+'%;left:15%;font-size:2rem;">🏃</div><div style="position:absolute;bottom:15%;left:0;right:0;height:3px;background:rgba(255,255,255,0.1);"></div>'+obs.map(function(o){return '<div style="position:absolute;bottom:16%;left:'+o.x+'%;font-size:1.5rem;">'+o.e+'</div>';}).join('');},50);
setTimeout(function(){if(!ov){ov=true;clearInterval(gl);a.style.position='';a.style.minHeight='';a.onclick=null;subScore(sc);}},15000);
document.getElementById('mCtrl').innerHTML='<div style="color:rgba(255,255,255,0.3);font-size:0.8rem;">Klik/tap om te springen!</div>';}

// 5. HEXAGON HEAT
function mgHexagon(){var a=document.getElementById('mArea'),colors=['#E94560','#4A90D9','#16C79A','#F5C518','#845EC2'],names=['Rood','Blauw','Groen','Geel','Paars'],sc=0,rd=0;
function nr(){if(rd>=10){subScore(sc);return;}rd++;var gs2=Math.min(7,4+Math.floor(rd/3)),tg=Math.floor(Math.random()*colors.length),grid=[];for(var i=0;i<gs2;i++)grid.push(Math.floor(Math.random()*colors.length));if(grid.indexOf(tg)===-1)grid[Math.floor(Math.random()*gs2)]=tg;
a.innerHTML='<div style="font-size:0.8rem;color:rgba(255,255,255,0.4);">Ronde '+rd+' — '+sc+'pts</div><div style="font-size:1.3rem;font-weight:900;margin:10px 0;">⬡ <span style="color:'+colors[tg]+';">'+names[tg]+'</span>!</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px;">'+grid.map(function(c){return '<button onclick="window._hp('+c+','+tg+')" style="width:55px;height:55px;background:'+colors[c]+';border:none;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);cursor:pointer;">⬡</button>';}).join('')+'</div>';mt=setTimeout(function(){sc=Math.max(0,sc-3);nr();},Math.max(600,2500-rd*200));}
window._hp=function(p,t){clearTimeout(mt);sc+=p===t?10:-5;sc=Math.max(0,sc);nr();};nr();document.getElementById('mCtrl').innerHTML='';}

// 6. PUSHY PENGUINS
function mgPenguins(){var a=document.getElementById('mArea');a.style.position='relative';a.style.minHeight='280px';a.style.overflow='hidden';var px=50,sc=0,pgs=[],ov=false;
a.onmousemove=function(e){var r=a.getBoundingClientRect();px=((e.clientX-r.left)/r.width)*100;};
a.ontouchmove=function(e){e.preventDefault();px=((e.touches[0].clientX-a.getBoundingClientRect().left)/a.getBoundingClientRect().width)*100;};
var gl=setInterval(function(){if(ov)return;sc++;if(Math.random()<0.12+sc*0.001)pgs.push({x:Math.random()*90+5,y:-10,v:1.5+Math.random()*2});pgs.forEach(function(p){p.y+=p.v;});if(pgs.some(function(p){return Math.abs(p.x-px)<8&&p.y>75&&p.y<95;})){ov=true;clearInterval(gl);a.style.position='';a.style.minHeight='';a.onmousemove=null;a.ontouchmove=null;subScore(sc);}pgs=pgs.filter(function(p){return p.y<110;});a.innerHTML='<div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);font-weight:800;color:var(--gold);">'+sc+'</div><div style="position:absolute;bottom:10%;left:'+px+'%;transform:translateX(-50%);font-size:2rem;z-index:5;">😰</div>'+pgs.map(function(p){return '<div style="position:absolute;left:'+p.x+'%;top:'+p.y+'%;font-size:1.2rem;transform:translateX(-50%);">🐧</div>';}).join('');},60);
setTimeout(function(){if(!ov){ov=true;clearInterval(gl);a.style.position='';a.style.minHeight='';a.onmousemove=null;a.ontouchmove=null;subScore(sc);}},12000);
document.getElementById('mCtrl').innerHTML='<div style="color:rgba(255,255,255,0.3);font-size:0.8rem;">Beweeg om pinguïns te ontwijken!</div>';}

// 7. SLAPARAZZI
function mgSlaparazzi(){var a=document.getElementById('mArea'),sc=0,rds=0,pos=50;
function np(){if(rds>=6){subScore(sc);return;}rds++;pos=50;a.innerHTML='<div style="font-size:0.8rem;color:rgba(255,255,255,0.4);">Foto '+rds+'/6</div><div style="width:200px;height:200px;border:4px solid rgba(255,255,255,0.2);border-radius:12px;margin:12px auto;position:relative;background:rgba(255,255,255,0.03);"><div style="position:absolute;left:50%;top:50%;width:40px;height:40px;border:2px dashed var(--gold);border-radius:50%;transform:translate(-50%,-50%);opacity:0.3;"></div><div id="_sp" style="position:absolute;left:'+pos+'%;top:50%;transform:translate(-50%,-50%);font-size:2rem;transition:left 0.2s;">😀</div></div><div style="display:flex;gap:8px;justify-content:center;margin-top:12px;"><button onclick="window._sm(-15)" style="padding:12px 24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:white;font-weight:800;cursor:pointer;">⬅️</button><button onclick="window._sm(15)" style="padding:12px 24px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:white;font-weight:800;cursor:pointer;">➡️</button></div>';
var pc=0,pi=setInterval(function(){if(pc>=2+rds){clearInterval(pi);return;}pos+=Math.random()>0.5?15:-15;pos=Math.max(10,Math.min(90,pos));var el=document.getElementById('_sp');if(el)el.style.left=pos+'%';pc++;},400);
setTimeout(function(){clearInterval(pi);var pts=Math.max(0,Math.round(20-Math.abs(pos-50)));sc+=pts;evt('📸 +'+pts);setTimeout(np,800);},2000+rds*300);}
window._sm=function(d){pos=Math.max(10,Math.min(90,pos+d));var el=document.getElementById('_sp');if(el)el.style.left=pos+'%';};np();document.getElementById('mCtrl').innerHTML='';}

// 8. FACE LIFT
function mgFaceLift(){var a=document.getElementById('mArea'),t={e:Math.floor(Math.random()*5),n:Math.floor(Math.random()*5),m:Math.floor(Math.random()*5)};var ee=['👀','😑','🤩','😳','🥺'],ne=['👃','🐽','🔴','💎','⭐'],me=['😊','😬','🤪','😤','🥴'];
a.innerHTML='<div style="display:flex;gap:32px;flex-wrap:wrap;justify-content:center;"><div style="text-align:center;"><div style="font-size:0.7rem;color:rgba(255,255,255,0.4);margin-bottom:8px;">TARGET</div><div style="background:rgba(255,255,255,0.06);border-radius:16px;padding:20px;font-size:2rem;line-height:1.8;">'+ee[t.e]+'<br>'+ne[t.n]+'<br>'+me[t.m]+'</div></div><div style="text-align:center;"><div style="font-size:0.7rem;color:rgba(255,255,255,0.4);margin-bottom:8px;">JOUW</div><div id="_fp" style="background:rgba(255,255,255,0.06);border-radius:16px;padding:20px;font-size:2rem;line-height:1.8;">'+ee[0]+'<br>'+ne[0]+'<br>'+me[0]+'</div></div></div>';
document.getElementById('mCtrl').innerHTML='<div style="margin-top:16px;display:flex;flex-direction:column;gap:8px;align-items:center;"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:0.75rem;color:rgba(255,255,255,0.4);width:50px;">Ogen</span><input type="range" id="_fe" min="0" max="4" value="0" oninput="window._uf()" style="width:150px;"></div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:0.75rem;color:rgba(255,255,255,0.4);width:50px;">Neus</span><input type="range" id="_fn" min="0" max="4" value="0" oninput="window._uf()" style="width:150px;"></div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:0.75rem;color:rgba(255,255,255,0.4);width:50px;">Mond</span><input type="range" id="_fm" min="0" max="4" value="0" oninput="window._uf()" style="width:150px;"></div><button onclick="window._sf()" style="margin-top:8px;padding:12px 32px;background:var(--gold);color:var(--primary);border:none;border-radius:10px;font-weight:800;cursor:pointer;">Klaar!</button></div>';
window._uf=function(){document.getElementById('_fp').innerHTML=ee[document.getElementById('_fe').value]+'<br>'+ne[document.getElementById('_fn').value]+'<br>'+me[document.getElementById('_fm').value];};
window._sf=function(){var c=0;if(+document.getElementById('_fe').value===t.e)c++;if(+document.getElementById('_fn').value===t.n)c++;if(+document.getElementById('_fm').value===t.m)c++;subScore(c*30);};}

// 9. BOWSER'S BLAST
function mgBowser(){var a=document.getElementById('mArea'),bomb=Math.floor(Math.random()*5),pr=[],cols=['#E94560','#4A90D9','#16C79A','#F5C518','#845EC2'];
function render(){a.innerHTML='<div style="font-size:3rem;margin-bottom:16px;">👹</div><div style="font-size:0.9rem;color:rgba(255,255,255,0.5);margin-bottom:20px;">4 veilig, 1 explodeert!</div><div style="display:flex;gap:12px;justify-content:center;">'+cols.map(function(c,i){var u=pr.indexOf(i)!==-1;return '<button onclick="window._bp('+i+')" style="width:60px;height:60px;border-radius:14px;background:'+(u?'rgba(255,255,255,0.03)':c)+';border:2px solid '+(u?'rgba(255,255,255,0.05)':c)+';cursor:'+(u?'not-allowed':'pointer')+';font-size:1.5rem;opacity:'+(u?'0.2':'1')+';">'+(u?'✓':'?')+'</button>';}).join('')+'</div>';}
window._bp=function(i){if(pr.indexOf(i)!==-1)return;if(i===bomb){a.innerHTML='<div style="font-size:4rem;">💥</div><div style="font-size:1.3rem;font-weight:900;color:var(--accent);margin-top:12px;">BOEM!</div>';setTimeout(function(){subScore(pr.length*25);},1500);}else{pr.push(i);if(pr.length===4){a.innerHTML='<div style="font-size:3rem;">🎉</div><div style="font-size:1.2rem;font-weight:900;color:var(--mint);margin-top:12px;">Perfect!</div>';setTimeout(function(){subScore(100);},1500);}else render();}};render();document.getElementById('mCtrl').innerHTML='';}

// 10. TRACE RACE
function mgTrace(){var a=document.getElementById('mArea');a.style.position='relative';a.style.minHeight='300px';var pts=[],cp=0,td=0;for(var i=0;i<8;i++)pts.push({x:15+Math.random()*70,y:10+i*10+Math.random()*5});
function render(){a.innerHTML='<svg width="100%" height="100%" style="position:absolute;top:0;left:0;"><polyline points="'+pts.map(function(p){return p.x+'%,'+p.y+'%';}).join(' ')+'" fill="none" stroke="rgba(245,197,24,0.3)" stroke-width="3" stroke-dasharray="6,4"/>'+pts.map(function(p,i){return '<circle cx="'+p.x+'%" cy="'+p.y+'%" r="'+(i===cp?12:8)+'" fill="'+(i<cp?'rgba(22,199,154,0.6)':i===cp?'var(--gold)':'rgba(255,255,255,0.15)')+'"/>';}).join('')+'</svg><div style="position:absolute;top:8px;right:16px;font-weight:800;color:var(--gold);">'+cp+'/8</div>';}
a.onclick=function(e){if(cp>=8)return;var r=a.getBoundingClientRect(),cx=((e.clientX-r.left)/r.width)*100,cy=((e.clientY-r.top)/r.height)*100,t=pts[cp],d=Math.sqrt(Math.pow(cx-t.x,2)+Math.pow(cy-t.y,2));if(d<12){td+=d;cp++;if(cp>=8){a.onclick=null;a.style.position='';a.style.minHeight='';subScore(Math.max(0,100-Math.round(td/8*2)));}render();}};render();document.getElementById('mCtrl').innerHTML='<div style="color:rgba(255,255,255,0.3);font-size:0.8rem;">Klik de checkpoints in volgorde!</div>';}

// GAME OVER
function rEnd(){show('sEnd');var p=gs.players,k=Object.keys(p);k.sort(function(a,b){return p[b].stars!==p[a].stars?p[b].stars-p[a].stars:p[b].coins-p[a].coins;});var w=p[k[0]],wc=getChar(w.char);document.getElementById('winnerName').textContent=wc.e+' '+w.name;document.getElementById('endList').innerHTML=k.map(function(id,i){var pl=p[id],c=getChar(pl.char);return '<div class="rrow"><div style="font-size:1.2rem;font-weight:900;min-width:30px;color:'+(i===0?'var(--gold)':'rgba(255,255,255,0.15)')+';">'+(i+1)+'</div><div style="font-size:1.3rem;">'+c.e+'</div><div style="flex:1;font-weight:700;">'+pl.name+'</div><div class="s"><span style="color:var(--gold);">⭐'+pl.stars+'</span><span style="color:var(--orange);">🪙'+pl.coins+'</span></div></div>';}).join('');}

// PARTICLES
(function(){var c=document.getElementById('particles');for(var i=0;i<20;i++){var p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=(2+Math.random()*4)+'px';p.style.height=p.style.width;p.style.background=['rgba(245,197,24,0.15)','rgba(233,69,96,0.1)','rgba(132,94,194,0.1)','rgba(22,199,154,0.1)'][Math.floor(Math.random()*4)];c.appendChild(p);}})();
