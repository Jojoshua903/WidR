<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WidR Quest — Story Mode</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0B0B16;--panel:rgba(26,26,46,0.85);--gold:#F5C518;--accent:#E94560;--mint:#16C79A;--blue:#0F3460;--purple:#845EC2;--coral:#FF6B6B;--orange:#FF9A3C;--text:#FAF3E0;--muted:rgba(250,243,224,0.5);--border:rgba(255,255,255,0.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center}
.screen{display:none;width:100vw;height:100vh;position:absolute;top:0;left:0;flex-direction:column}
.screen.active{display:flex}
button{font-family:inherit;cursor:pointer;border:none;transition:all .2s}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(1px)}
button:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

/* TITLE SCREEN */
#title-screen{align-items:center;justify-content:center;text-align:center;padding:20px;background:linear-gradient(180deg,#080812 0%,#0e0e2a 50%,#0B0B16 100%)}
.title-logo{font-size:3.5rem;font-weight:900;margin-bottom:4px;text-shadow:0 0 40px rgba(245,197,24,0.3)}
.title-logo span{color:var(--gold)}
.title-sub{color:var(--muted);font-size:.85rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:40px}
.title-menu{display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px}
.title-btn{padding:16px 24px;border-radius:14px;font-weight:800;font-size:.95rem;letter-spacing:1px;text-transform:uppercase}
.title-btn-story{background:linear-gradient(135deg,var(--gold),#D4A316);color:#1A1A2E}
.title-btn-free{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border)}
.title-btn-free:hover{background:rgba(255,255,255,.1)}
.title-btn-load{background:rgba(22,199,154,.1);color:var(--mint);border:1px solid rgba(22,199,154,.2)}
.title-btn-load:hover{background:rgba(22,199,154,.15)}
.save-info{font-size:.65rem;color:var(--muted);margin-top:2px;font-weight:400;text-transform:none;letter-spacing:0}
.difficulty-row{display:flex;gap:8px;margin-top:10px}
.diff-btn{flex:1;padding:12px 8px;border-radius:10px;background:rgba(255,255,255,.04);color:var(--muted);font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:2px solid transparent;text-align:center}
.diff-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.06)}
.diff-label{font-size:.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700;margin-top:16px;margin-bottom:4px}

/* DIALOGUE SCREEN */
#dialogue-screen{padding:0;background:#080812}
.dialogue-bg{width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;position:relative}
.dialogue-scene{flex:1;display:flex;align-items:center;justify-content:center;gap:40px;padding:40px}
.dialogue-char{text-align:center;transition:all .4s}
.dialogue-char.speaking{transform:scale(1.1)}
.dialogue-char.dim{opacity:.4;transform:scale(.9)}
.dialogue-char-emoji{font-size:4rem}
.dialogue-char-name{font-size:.75rem;font-weight:700;margin-top:6px;letter-spacing:1px}
.dialogue-box{background:var(--panel);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:24px 40px;min-height:160px;display:flex;flex-direction:column;justify-content:space-between}
.dialogue-speaker{font-size:.7rem;color:var(--gold);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.dialogue-text{font-size:.95rem;line-height:1.7;max-width:800px;min-height:60px}
.dialogue-continue{align-self:flex-end;padding:10px 24px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--muted);font-size:.75rem;font-weight:700;border:1px solid var(--border);margin-top:12px}
.dialogue-continue:hover{background:rgba(245,197,24,.1);color:var(--gold);border-color:rgba(245,197,24,.3)}
.chapter-title-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(8,8,18,.95);z-index:10;animation:fadeSlide .6s ease}
.chapter-num{font-size:.8rem;color:var(--gold);letter-spacing:4px;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.chapter-name{font-size:2.2rem;font-weight:900;margin-bottom:16px;text-align:center}
.chapter-desc{color:var(--muted);font-size:.85rem;text-align:center;max-width:400px;line-height:1.6;margin-bottom:30px}

/* UNLOCK SCREEN */
#unlock-screen{align-items:center;justify-content:center;text-align:center;padding:40px;background:radial-gradient(circle at 50% 50%,rgba(245,197,24,.08),transparent 60%),#080812}
.unlock-badge{font-size:5rem;margin-bottom:16px;animation:popIn .5s ease}
.unlock-title{font-size:.75rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.unlock-name{font-size:2rem;font-weight:900;margin-bottom:4px}
.unlock-role{color:var(--muted);font-size:.85rem;margin-bottom:24px}
.unlock-stats{display:flex;gap:12px;justify-content:center;margin-bottom:30px}
.unlock-stat{background:var(--panel);padding:8px 14px;border-radius:8px;border:1px solid var(--border);font-size:.7rem;font-weight:700}
@keyframes popIn{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}

/* SELECT SCREEN */
#select-screen{align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.select-title{font-size:2.4rem;font-weight:900;text-align:center;margin-bottom:4px}
.select-title span{color:var(--gold)}
.select-sub{color:var(--muted);font-size:.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;text-align:center}
.roster{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:720px;width:100%;margin-bottom:16px}
.roster-card{background:var(--panel);border:2px solid transparent;border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .25s;position:relative}
.roster-card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15)}
.roster-card.picked{border-color:var(--gold);background:rgba(245,197,24,.08)}
.roster-card.picked::after{content:'✓';position:absolute;top:6px;right:8px;color:var(--gold);font-weight:900;font-size:.75rem}
.roster-card.locked{opacity:.3;cursor:not-allowed;pointer-events:none}
.roster-card.locked::after{content:'🔒';position:absolute;top:6px;right:8px;font-size:.7rem}
.rc-emoji{font-size:2rem;display:block;margin-bottom:4px}
.rc-name{font-size:.75rem;font-weight:700}
.rc-title{font-size:.6rem;color:var(--muted);margin-top:2px}
.rc-stats{display:flex;gap:3px;justify-content:center;margin-top:6px;flex-wrap:wrap}
.rc-stat{font-size:.5rem;padding:2px 4px;border-radius:4px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:600}
.party-preview{display:flex;gap:10px;margin-bottom:14px;min-height:46px;justify-content:center;align-items:center}
.pp-slot{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:1.4rem;transition:all .3s}
.pp-slot.filled{border-style:solid;border-color:var(--gold);background:rgba(245,197,24,.06)}
.start-btn{padding:14px 48px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#D4A316);color:#1A1A2E;font-weight:800;font-size:1rem;letter-spacing:1px;text-transform:uppercase}

/* BATTLE SCREEN */
#battle-screen{padding:0;background:#080812}
.battle-bg{width:100%;height:100%;display:grid;grid-template-rows:1fr auto;position:relative}
.arena{flex:1;display:flex;justify-content:space-between;align-items:center;padding:30px 40px;position:relative}
.team-side{display:flex;flex-direction:column;gap:8px}
.fighter{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;background:var(--panel);border:1px solid var(--border);min-width:190px;transition:all .3s}
.fighter.active-turn{border-color:var(--gold);box-shadow:0 0 16px rgba(245,197,24,.2)}
.fighter.ko{opacity:.35;filter:grayscale(1)}
.fighter.hit{animation:shake .3s}
.fighter.boss-fighter{border-color:var(--accent);background:rgba(233,69,96,.08);min-width:220px}
.f-emoji{font-size:1.6rem;min-width:32px;text-align:center}
.f-info{flex:1}
.f-name{font-size:.7rem;font-weight:700}
.f-hp-row{display:flex;align-items:center;gap:6px;margin-top:3px}
.f-hp-bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.f-hp-fill{height:100%;border-radius:3px;transition:width .4s;background:var(--mint)}
.f-hp-fill.low{background:var(--coral)}
.f-hp-fill.mid{background:var(--orange)}
.f-hp-text{font-size:.55rem;color:var(--muted);min-width:40px;text-align:right;font-weight:600}
.f-mp-row{display:flex;align-items:center;gap:6px;margin-top:2px}
.f-mp-bar{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.f-mp-fill{height:100%;border-radius:2px;transition:width .4s;background:var(--blue)}
.f-mp-text{font-size:.5rem;color:var(--muted);min-width:40px;text-align:right}
.f-status{display:flex;gap:3px;margin-top:3px}
.status-icon{font-size:.6rem;padding:1px 4px;border-radius:3px;background:rgba(255,255,255,.06)}
.battle-num{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--panel);padding:6px 14px;border-radius:8px;border:1px solid var(--border)}
.vs-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;font-weight:900;color:rgba(255,255,255,.06)}

.battle-hud{background:var(--panel);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:14px 24px;display:flex;gap:16px;align-items:stretch;min-height:130px}
.log-panel{flex:1.5;display:flex;flex-direction:column}
.log-title{font-size:.6rem;color:var(--gold);letter-spacing:1.5px;font-weight:700;margin-bottom:4px;text-transform:uppercase}
.log-box{flex:1;overflow-y:auto;font-size:.7rem;color:var(--muted);line-height:1.6;max-height:85px}
.log-box .dmg{color:var(--coral)}
.log-box .heal{color:var(--mint)}
.log-box .info{color:var(--gold)}
.log-box .buff{color:var(--purple)}
.action-panel{flex:1;display:flex;flex-direction:column;gap:5px}
.action-title{font-size:.6rem;color:var(--gold);letter-spacing:1.5px;font-weight:700;margin-bottom:2px;text-transform:uppercase}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1}
.act-btn{padding:8px;border-radius:8px;font-weight:700;font-size:.65rem;text-transform:uppercase;letter-spacing:.5px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
.act-btn .cost{font-size:.5rem;font-weight:400;opacity:.7;margin-top:2px}
.btn-atk{background:linear-gradient(135deg,var(--coral),#D84D4D);color:#fff}
.btn-spc{background:linear-gradient(135deg,var(--purple),#6B3FA0);color:#fff}
.btn-def{background:linear-gradient(135deg,var(--blue),#0A2540);color:#fff}
.btn-itm{background:linear-gradient(135deg,var(--orange),#D4820E);color:#fff}
.moves-panel,.target-panel,.items-panel{flex:1.2;display:none;flex-direction:column;gap:4px}
.moves-panel.active,.target-panel.active,.items-panel.active{display:flex}
.move-btn{padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--text);font-size:.65rem;font-weight:600;text-align:left;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.move-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.move-btn .mv-cost{font-size:.55rem;color:var(--muted)}
.tgt-btn{padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.06);color:var(--text);font-size:.65rem;font-weight:600;border:1px solid var(--border);text-align:left}
.tgt-btn:hover{background:rgba(233,69,96,.1);border-color:var(--accent)}
.back-btn{padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.05);color:var(--muted);font-size:.6rem;margin-top:auto;align-self:flex-start}

/* TRANSITION */
#transition-screen{align-items:center;justify-content:center;text-align:center;padding:40px}
.trans-title{font-size:1.8rem;font-weight:900;margin-bottom:8px}
.trans-sub{color:var(--muted);font-size:.8rem;margin-bottom:16px}
.trans-party{display:flex;gap:14px;margin-bottom:20px;justify-content:center;flex-wrap:wrap}
.tp-card{background:var(--panel);border-radius:12px;padding:10px 14px;border:1px solid var(--border);min-width:90px;text-align:center}
.tp-emoji{font-size:1.4rem}
.tp-name{font-size:.65rem;font-weight:700;margin-top:4px}
.tp-hp{font-size:.55rem;color:var(--mint);margin-top:2px}
.next-btn{padding:14px 40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#B82C44);color:#fff;font-weight:800;font-size:.85rem;letter-spacing:1px;text-transform:uppercase}

/* RESULT */
#result-screen{align-items:center;justify-content:center;text-align:center;padding:40px}
.result-title{font-size:3rem;font-weight:900;margin-bottom:8px}
.result-sub{color:var(--muted);font-size:.95rem;margin-bottom:24px;max-width:500px;line-height:1.6}
.result-btn{padding:14px 40px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#D4A316);color:#1A1A2E;font-weight:800;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;margin:4px}

@keyframes popUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeSlide .4s ease}

@media(max-width:768px){
  .roster{grid-template-columns:repeat(3,1fr)}
  .arena{padding:20px 16px;flex-direction:column;gap:20px}
  .fighter{min-width:140px}
  .battle-hud{flex-direction:column;padding:12px 16px;min-height:auto}
  .dialogue-scene{flex-direction:column;gap:20px;padding:20px}
  .dialogue-box{padding:20px}
  .title-logo{font-size:2.5rem}
}
</style>
</head>
<body>

<div id="title-screen" class="screen active">
  <div class="title-logo">WidR <span>Quest</span></div>
  <div class="title-sub">Story Mode</div>
  <div class="title-menu">
    <button class="title-btn title-btn-story" onclick="startStoryMode()">Nieuw Verhaal ⚔️</button>
    <button class="title-btn title-btn-load" id="btn-continue" style="display:none" onclick="loadGame()">
      Verder Spelen →
      <div class="save-info" id="save-info"></div>
    </button>
    <button class="title-btn title-btn-free" onclick="startFreePlay()">Vrij Spelen 🎮</button>
    <div class="diff-label">Moeilijkheid</div>
    <div class="difficulty-row">
      <button class="diff-btn" onclick="setDiff('easy',this)">😊 Easy</button>
      <button class="diff-btn active" onclick="setDiff('normal',this)">⚔️ Normal</button>
      <button class="diff-btn" onclick="setDiff('hard',this)">💀 Hard</button>
    </div>
  </div>
</div>

<div id="dialogue-screen" class="screen">
  <div class="dialogue-bg">
    <div id="chapter-overlay" class="chapter-title-overlay" style="display:none">
      <div class="chapter-num" id="ch-num"></div>
      <div class="chapter-name" id="ch-name"></div>
      <div class="chapter-desc" id="ch-desc"></div>
      <button class="title-btn title-btn-story" onclick="dismissChapterTitle()">Begin →</button>
    </div>
    <div class="dialogue-scene" id="dialogue-scene"></div>
    <div class="dialogue-box">
      <div class="dialogue-speaker" id="dialogue-speaker"></div>
      <div class="dialogue-text" id="dialogue-text"></div>
      <button class="dialogue-continue" id="dialogue-next" onclick="nextDialogue()">Verder →</button>
    </div>
  </div>
</div>

<div id="unlock-screen" class="screen">
  <div class="unlock-badge" id="unlock-emoji"></div>
  <div class="unlock-title">Nieuw Karakter Ontgrendeld!</div>
  <div class="unlock-name" id="unlock-name"></div>
  <div class="unlock-role" id="unlock-role"></div>
  <div class="unlock-stats" id="unlock-stats"></div>
  <button class="title-btn title-btn-story" onclick="afterUnlock()">Doorgaan →</button>
</div>

<div id="select-screen" class="screen">
  <div class="select-title">WidR <span>Quest</span></div>
  <div class="select-sub" id="select-sub">Kies je party van 4 helden</div>
  <div class="party-preview" id="party-preview"></div>
  <div class="roster" id="roster"></div>
  <button class="start-btn" id="btn-start" disabled>Kies 4 helden</button>
</div>

<div id="battle-screen" class="screen">
  <div class="battle-bg">
    <div class="arena">
      <div class="battle-num" id="battle-label">Battle 1</div>
      <div class="vs-text">VS</div>
      <div class="team-side" id="party-side"></div>
      <div class="team-side" id="enemy-side"></div>
    </div>
    <div class="battle-hud">
      <div class="log-panel"><div class="log-title">Battle Log</div><div class="log-box" id="log-box"></div></div>
      <div class="action-panel" id="action-panel">
        <div class="action-title" id="action-title">Kies actie</div>
        <div class="action-grid" id="action-grid"></div>
      </div>
      <div class="moves-panel" id="moves-panel">
        <div class="action-title">Kies move</div>
        <div id="moves-list"></div>
        <button class="back-btn" onclick="showActions()">← Terug</button>
      </div>
      <div class="target-panel" id="target-panel">
        <div class="action-title" id="target-title">Kies doel</div>
        <div id="target-list"></div>
        <button class="back-btn" onclick="showActions()">← Terug</button>
      </div>
      <div class="items-panel" id="items-panel">
        <div class="action-title">Items</div>
        <div id="items-list"></div>
        <button class="back-btn" onclick="showActions()">← Terug</button>
      </div>
    </div>
  </div>
</div>

<div id="transition-screen" class="screen">
  <div class="trans-title" id="trans-title">Victory!</div>
  <div class="trans-sub" id="trans-sub"></div>
  <div class="trans-party" id="trans-party"></div>
  <button class="next-btn" id="btn-next">Volgende →</button>
</div>

<div id="result-screen" class="screen">
  <div class="result-title" id="result-title">🏆</div>
  <div class="result-sub" id="result-sub"></div>
  <button class="result-btn" onclick="location.reload()">Opnieuw Spelen</button>
  <button class="result-btn" style="background:rgba(255,255,255,.06);color:var(--text)" onclick="location.href='index.html'">Terug naar WidR</button>
</div>

<script>
// ===== ALL HEROES =====
var HEROES = [
  { id:'josh', name:'Josh', emoji:'👑', title:'Admin & Tank', hp:140, mp:40, atk:22, def:20, spd:12, spc:18,
    moves:[{name:'Admin Slap',type:'atk',power:30,cost:0,desc:'Basis aanval'},{name:'Orde Handhaving',type:'heal',power:45,cost:12,target:'ally',desc:'Heelt een bondgenoot'},{name:'Ban Hammer',type:'atk',power:55,cost:15,desc:'Zware banhammer klap'},{name:'Server Reset',type:'heal_all',power:30,cost:25,desc:'Heelt hele party'}]},
  { id:'fionn', name:'Fionn', emoji:'😑', title:'Debuff Mage', hp:95, mp:55, atk:18, def:14, spd:16, spc:32,
    moves:[{name:'Sarcastic Sigh',type:'atk',power:25,cost:0,desc:'Droge humor schade'},{name:'Boeiend...',type:'debuff',power:0,cost:10,effect:'def_down',desc:'Verlaagt DEF'},{name:'Eye Roll',type:'atk',power:50,cost:15,desc:'Vernietigend sarcasme'},{name:'Klaar Met Je',type:'atk',power:70,cost:28,effect:'stun',desc:'Stunt 1 beurt'}]},
  { id:'nath', name:'Nath', emoji:'😤', title:'Berserker', hp:120, mp:35, atk:35, def:16, spd:14, spc:15,
    moves:[{name:'Frustratie Klap',type:'atk',power:38,cost:0,desc:'Harder als je boos bent'},{name:'IRRITANT!',type:'atk',power:55,cost:12,effect:'burn',desc:'Brandschade over tijd'},{name:'Rage Charge',type:'buff',power:0,cost:8,effect:'atk_up',target:'self',desc:'Boost ATK'},{name:'Explosie',type:'atk_all',power:50,cost:25,desc:'Woede-explosie'}]},

var difficulty = 'normal';
var diffMods = { easy:{hp:0.7,atk:0.7,def:0.7}, normal:{hp:1,atk:1,def:1}, hard:{hp:1.4,atk:1.4,def:1.3} };
var G = { party:[], enemies:[], turnOrder:[], turnIdx:0, log:[], items:{potion:3,elixir:2}, phase:'title', selectedMove:null, selectedAction:null };
var storyState = { chapter:0, battleIdx:0, phase:'title', unlockedIds:['josh','fionn','nath','milo'], mode:'story' };
var picked = [];

// ===== DIFFICULTY =====
function setDiff(d, btn) {
  difficulty = d;

// ===== SAVE / LOAD =====
function saveGame() {
  var save = { chapter:storyState.chapter, battleIdx:storyState.battleIdx, unlocked:storyState.unlockedIds, difficulty:difficulty,
    party:G.party.map(function(p){return {id:p.id,curHp:p.curHp,curMp:p.curMp,alive:p.alive};}),
    items:G.items, date:new Date().toLocaleString('nl-NL') };
  try { localStorage.setItem('widr_rpg_save', JSON.stringify(save)); } catch(e){}
}
function loadGame() {
  try {
    var save = JSON.parse(localStorage.getItem('widr_rpg_save'));
    if (!save) return;
    difficulty = save.difficulty || 'normal';
    storyState.unlockedIds = save.unlocked || ['josh','fionn','nath','milo'];
    storyState.chapter = save.chapter;
    storyState.battleIdx = save.battleIdx;
    storyState.mode = 'story';
    G.items = save.items || {potion:3,elixir:2};
    var ch = CHAPTERS[storyState.chapter];
    var partyIds = storyState.chapter === 0 ? ch.startPartyIds : storyState.unlockedIds.slice(0,4);
    if (save.party) {
      G.party = save.party.map(function(sp) {
        var hero = HEROES.find(function(h){return h.id===sp.id;});
        if (!hero) return null;
        var f = makeFighter(hero, false);
        f.curHp = sp.curHp; f.curMp = sp.curMp; f.alive = sp.alive;
        return f;
      }).filter(function(f){return f;});
    } else {
      G.party = partyIds.map(function(id){return makeFighter(HEROES.find(function(h){return h.id===id;}),false);});
    }
    startStoryBattle();
  } catch(e) { alert('Save is corrupt.'); }
}
function checkSave() {
  try {
    var save = JSON.parse(localStorage.getItem('widr_rpg_save'));
    if (save) {
      document.getElementById('btn-continue').style.display = 'block';
      document.getElementById('save-info').textContent = 'Chapter ' + (save.chapter+1) + ' — ' + (save.date||'');
    }
  } catch(e){}
}

function startStoryMode() {

}
function showChapterIntro() {

// ===== DIALOGUE SYSTEM =====
var currentDialogues = [];
var dialogueIdx = 0;
function showDialogue() {
  if (dialogueIdx >= currentDialogues.length) { endDialogue(); return; }
  var d = currentDialogues[dialogueIdx];
  var scene = document.getElementById('dialogue-scene');
  var chars = [];
  currentDialogues.forEach(function(dl) {
    if (chars.indexOf(dl.speaker) === -1 && chars.length < 4) chars.push(dl.speaker);
  });
  scene.innerHTML = chars.map(function(name) {
    var dl = currentDialogues.find(function(x){return x.speaker===name;});
    var isSpeaking = name === d.speaker;
    return '<div class="dialogue-char ' + (isSpeaking?'speaking':'dim') + '"><div class="dialogue-char-emoji">' + (dl?dl.emoji:'') + '</div><div class="dialogue-char-name">' + name + '</div></div>';
  }).join('');
  document.getElementById('dialogue-speaker').textContent = d.speaker;
  document.getElementById('dialogue-text').textContent = d.text;
  var nextBtn = document.getElementById('dialogue-next');
  nextBtn.textContent = dialogueIdx >= currentDialogues.length - 1 ? 'Start Battle →' : 'Verder →';
  if (storyState.phase === 'dialogue_outro' && dialogueIdx >= currentDialogues.length - 1) nextBtn.textContent = 'Verder →';
}
function nextDialogue() {
  dialogueIdx++;
  if (dialogueIdx >= currentDialogues.length) { endDialogue(); return; }
  showDialogue();
}
function endDialogue() {
  if (storyState.phase === 'dialogue_intro') {
    storyState.battleIdx = 0;
    var ch = CHAPTERS[storyState.chapter];
    if (storyState.chapter === 0) {
      G.party = ch.startPartyIds.map(function(id){return makeFighter(HEROES.find(function(h){return h.id===id;}),false);});
    } else if (G.party.length === 0) {
      var ids = storyState.unlockedIds.slice(0,4);
      G.party = ids.map(function(id){return makeFighter(HEROES.find(function(h){return h.id===id;}),false);});
    }
    startStoryBattle();
  } else if (storyState.phase === 'dialogue_midBoss') {
    startStoryBattle();
  } else if (storyState.phase === 'dialogue_outro') {
    var ch = CHAPTERS[storyState.chapter];
    if (ch.unlockAfter) {
      showUnlock(ch.unlockAfter);
    } else {
      finishChapter();
    }
  }
}

// ===== UNLOCK =====
function showUnlock(heroId) {
  var hero = HEROES.find(function(h){return h.id===heroId;});
  if (!hero) { finishChapter(); return; }
  if (storyState.unlockedIds.indexOf(heroId) === -1) storyState.unlockedIds.push(heroId);
  showScreen('unlock-screen');
  document.getElementById('unlock-emoji').textContent = hero.emoji;
  document.getElementById('unlock-name').textContent = hero.name;
  document.getElementById('unlock-role').textContent = hero.title;
  document.getElementById('unlock-stats').innerHTML = '<div class="unlock-stat">HP ' + hero.hp + '</div><div class="unlock-stat">ATK ' + hero.atk + '</div><div class="unlock-stat">DEF ' + hero.def + '</div><div class="unlock-stat">SPD ' + hero.spd + '</div>';
}
function afterUnlock() { finishChapter(); }
function finishChapter() {
  storyState.chapter++;
  if (storyState.chapter >= CHAPTERS.length) {
    showScreen('result-screen');
    document.getElementById('result-title').textContent = '🏆 QUEST VOLTOOID!';
    document.getElementById('result-sub').textContent = 'Je hebt alle 5 chapters overwonnen en The Unranked verslagen! De ranking is veilig. Je bent de ultieme WidR kampioen!';
    try { localStorage.removeItem('widr_rpg_save'); } catch(e){}
    return;
  }
  // Heal party for next chapter
  G.party.forEach(function(p){p.curHp=p.maxHp;p.curMp=p.maxMp;p.alive=true;p.statuses=[];p.atkMod=0;p.defMod=0;p.defending=false;p.shield=false;});
  G.items.potion = Math.min(5, G.items.potion + 2);
  G.items.elixir = Math.min(3, G.items.elixir + 1);
  // Let player pick party if they have more than 4 unlocked
  if (storyState.unlockedIds.length > 4) {
    showPartySelect();
  } else {
    G.party = storyState.unlockedIds.map(function(id){return makeFighter(HEROES.find(function(h){return h.id===id;}),false);});
    showChapterIntro();
  }
}
function showPartySelect() {
  picked = storyState.unlockedIds.slice(0,4);
  showScreen('select-screen');
  document.getElementById('select-sub').textContent = 'Kies 4 helden voor Chapter ' + (storyState.chapter+1);
  renderRoster();
}

// ===== STORY BATTLES =====
function startStoryBattle() {
  var ch = CHAPTERS[storyState.chapter];
  var battle = ch.battles[storyState.battleIdx];
  if (!battle) { storyState.phase = 'dialogue_outro'; currentDialogues = ch.dialogues.outro; dialogueIdx = 0; showScreen('dialogue-screen'); showDialogue(); return; }
  if (battle.boss && ch.dialogues.midBoss && storyState.phase !== 'dialogue_midBoss_done') {
    storyState.phase = 'dialogue_midBoss';
    currentDialogues = ch.dialogues.midBoss;
    dialogueIdx = 0;
    showScreen('dialogue-screen');
    showDialogue();
    storyState.phase = 'dialogue_midBoss';
    return;
  }
  storyState.phase = 'battle';
  var mod = diffMods[difficulty];
  G.enemies = battle.enemies.map(function(e) {
    var scaled = JSON.parse(JSON.stringify(e));
    scaled.hp = Math.round(scaled.hp * mod.hp);
    scaled.atk = Math.round(scaled.atk * mod.atk);
    scaled.def = Math.round(scaled.def * mod.def);
    return makeFighter(scaled, true);
  });
  G.log = [];
  showScreen('battle-screen');
  document.getElementById('battle-label').textContent = battle.label;
  buildTurnOrder();
  renderBattle();
  saveGame();
  nextTurn();
}

// ===== FREE PLAY =====
function startFreePlay() {

  storyState.unlockedIds = HEROES.map(function(h){return h.id;});

function togglePick(id) {
  if (storyState.unlockedIds.indexOf(id) === -1) return;
  var idx = picked.indexOf(id);
  if (idx >= 0) picked.splice(idx, 1);
  else if (picked.length < 4) picked.push(id);
  renderRoster();
}

// ===== BATTLE ENGINE =====
function makeFighter(data, isEnemy) {
  return { id:data.id, name:data.name, emoji:data.emoji, hp:data.hp, mp:data.mp||0, atk:data.atk, def:data.def, spd:data.spd||10, spc:data.spc||10,
    maxHp:data.hp, maxMp:data.mp||0, curHp:data.hp, curMp:data.mp||0, moves:data.moves||[], boss:data.boss||false,
    isEnemy:isEnemy, alive:true, statuses:[], defending:false, shield:false, atkMod:0, defMod:0 };
}
function buildTurnOrder() {
  var all = G.party.filter(function(f){return f.alive;}).concat(G.enemies.filter(function(f){return f.alive;}));
  G.turnOrder = all.sort(function(a,b){return (b.spd||0)-(a.spd||0);});
  G.turnIdx = -1;
}
function nextTurn() {
  G.turnIdx++;
  if (checkBattleEnd()) return;
  if (G.turnIdx >= G.turnOrder.length) { buildTurnOrder(); G.turnIdx = 0; }
  var cur = G.turnOrder[G.turnIdx];
  if (!cur || !cur.alive) { nextTurn(); return; }
  cur.defending = false;
  var skipTurn = false;
  cur.statuses = cur.statuses.filter(function(s) {
    s.turns--;
    if (s.type === 'burn') { var dmg = Math.floor(cur.maxHp * 0.08); cur.curHp = Math.max(0, cur.curHp - dmg); addLog(cur.emoji + ' ' + cur.name + ' neemt ' + dmg + ' brandschade! 🔥', 'dmg'); if (cur.curHp <= 0) { cur.alive = false; addLog(cur.emoji + ' ' + cur.name + ' is verslagen!', 'info'); } }
    if (s.type === 'stun') { skipTurn = true; addLog(cur.emoji + ' ' + cur.name + ' is gestund!', 'info'); }
    if (s.type === 'confuse' && !cur.isEnemy && Math.random() < 0.4) { skipTurn = true; addLog(cur.emoji + ' ' + cur.name + ' is verward!', 'dmg'); cur.curHp = Math.max(0, cur.curHp - 10); }
    return s.turns > 0;
  });
  if (!cur.alive) { renderBattle(); nextTurn(); return; }
  if (skipTurn) { renderBattle(); setTimeout(nextTurn, 600); return; }
  renderBattle();
  if (cur.isEnemy) setTimeout(function(){enemyAI(cur);}, 700);
  else showActions(cur);
}
function enemyAI(enemy) {
  var targets = G.party.filter(function(f){return f.alive;});
  if (!targets.length) return;
  var move = enemy.moves[Math.floor(Math.random() * enemy.moves.length)];
  executeMove(enemy, move, targets);
}

// ===== MOVE EXECUTION =====
function executeMove(user, move, potentialTargets, specificTarget) {
  var t = move.type;
  if (t === 'atk') {
    var target = specificTarget || potentialTargets[Math.floor(Math.random()*potentialTargets.length)];
    var dmg = calcDamage(user, target, move);
    applyDamage(target, dmg);
    addLog(user.emoji + ' ' + user.name + ' → ' + move.name + ' → ' + target.emoji + ' ' + target.name + ' (' + dmg + ' dmg)', 'dmg');
    if (move.effect === 'burn') applyStatus(target, 'burn', 3);
    if (move.effect === 'stun') applyStatus(target, 'stun', 1);
    if (move.effect === 'confuse') applyStatus(target, 'confuse', 2);
    if (move.effect === 'def_down') { target.defMod -= 5; addLog(target.name + ' DEF ⬇', 'buff'); }
    if (move.effect === 'heal_self') { var h = move.heal||15; user.curHp = Math.min(user.maxHp, user.curHp + h); addLog(user.name + ' heelt ' + h + ' HP', 'heal'); }
  } else if (t === 'atk_all') {
    addLog(user.emoji + ' ' + user.name + ' → ' + move.name + '!', 'info');
    potentialTargets.forEach(function(tgt) { if (!tgt.alive) return; var dmg = calcDamage(user, tgt, move); applyDamage(tgt, dmg); addLog('  → ' + tgt.emoji + ' ' + tgt.name + ' (' + dmg + ')', 'dmg'); if (move.effect === 'burn') applyStatus(tgt, 'burn', 3); });
  } else if (t === 'atk_multi') {
    addLog(user.emoji + ' ' + user.name + ' → ' + move.name + '!', 'info');
    for (var i = 0; i < (move.hits||3); i++) { var alive = potentialTargets.filter(function(f){return f.alive;}); if (!alive.length) break; var tgt = alive[Math.floor(Math.random()*alive.length)]; var dmg = calcDamage(user, tgt, move); applyDamage(tgt, dmg); addLog('  Hit ' + (i+1) + '! ' + tgt.emoji + ' (' + dmg + ')', 'dmg'); }
  } else if (t === 'atk_random') {
    var all = G.party.filter(function(f){return f.alive;}).concat(G.enemies.filter(function(f){return f.alive;})).filter(function(f){return f!==user;});
    var tgt = all[Math.floor(Math.random()*all.length)]; var dmg = calcDamage(user, tgt, move); applyDamage(tgt, dmg); addLog(user.emoji + ' ' + move.name + ' → ' + tgt.emoji + ' (' + dmg + ')', 'dmg');
  } else if (t === 'heal') {
    var target = specificTarget; var heal = move.power + Math.floor(user.spc * 0.5); target.curHp = Math.min(target.maxHp, target.curHp + heal); addLog(user.emoji + ' heelt ' + target.emoji + ' +' + heal + ' HP', 'heal');
  } else if (t === 'heal_all') {
    G.party.filter(function(f){return f.alive;}).forEach(function(f){ var heal = move.power + Math.floor(user.spc * 0.3); f.curHp = Math.min(f.maxHp, f.curHp + heal); }); addLog(user.emoji + ' ' + move.name + ' — party geheeld!', 'heal');
  } else if (t === 'heal_self') {
    user.curHp = Math.min(user.maxHp, user.curHp + move.power); addLog(user.emoji + ' herstelt ' + move.power + ' HP', 'heal');
  } else if (t === 'buff') {
    if (move.effect === 'atk_up') { user.atkMod += 8; addLog(user.emoji + ' ATK ⬆', 'buff'); }
    if (move.effect === 'shield') { user.shield = true; addLog(user.emoji + ' is beschermd! ✨', 'buff'); }
  } else if (t === 'buff_all') {
    G.party.filter(function(f){return f.alive;}).forEach(function(f){ if (move.effect === 'atk_up') f.atkMod += 6; if (move.effect === 'shield') f.shield = true; }); addLog(user.emoji + ' ' + move.name + ' — party gebuffed!', 'buff');
  } else if (t === 'debuff') {
    var target = specificTarget || potentialTargets[Math.floor(Math.random()*potentialTargets.length)];
    if (move.effect === 'def_down') { target.defMod -= 6; addLog(user.emoji + ' verlaagt ' + target.name + ' DEF', 'buff'); }
    if (move.effect === 'confuse') applyStatus(target, 'confuse', 2);
    if (move.effect === 'stun') applyStatus(target, 'stun', 1);
  } else if (t === 'debuff_all') {
    potentialTargets.forEach(function(tgt){ if (move.effect === 'confuse') applyStatus(tgt, 'confuse', 2); }); addLog(user.emoji + ' ' + move.name + '!', 'buff');
  }
  if (move.cost) user.curMp = Math.max(0, (user.curMp||0) - move.cost);
  renderBattle();
  setTimeout(nextTurn, 800);
}
function calcDamage(atk, def, move) {
  var base = move.power + (atk.atk||0) + (atk.atkMod||0);
  var defense = Math.max(0, (def.def||0) + (def.defMod||0));
  if (def.defending) defense *= 2;
  if (def.shield) { def.shield = false; return Math.floor(base * 0.15); }
  var dmg = Math.max(1, Math.floor(base - defense * 0.6));
  var crit = Math.random() < (0.1 + (move.crit_bonus||0)/100);
  if (crit) { dmg = Math.floor(dmg * 1.6); addLog('CRITICAL! 💥', 'info'); }
  dmg += Math.floor(Math.random() * 6) - 3;
  return Math.max(1, dmg);
}
function applyDamage(target, dmg) {
  target.curHp = Math.max(0, target.curHp - dmg);
  if (target.curHp <= 0) { target.alive = false; addLog('💀 ' + target.emoji + ' ' + target.name + ' verslagen!', 'info'); }
  var el = document.getElementById('f-' + (target.id||target.name));
  if (el) { el.classList.add('hit'); setTimeout(function(){if(el)el.classList.remove('hit');}, 300); }
}
function applyStatus(target, type, turns) {
  if (target.statuses.find(function(s){return s.type===type;})) return;
  target.statuses.push({type:type,turns:turns});
  var labels = {burn:'🔥',stun:'⚡',confuse:'🌀'};
  addLog(target.name + ' → ' + (labels[type]||type), 'buff');
}

// ===== BATTLE END =====
function checkBattleEnd() {
  if (G.party.every(function(f){return !f.alive;})) {
    setTimeout(function() {
      showScreen('result-screen');
      document.getElementById('result-title').textContent = '💀 Game Over';
      document.getElementById('result-sub').textContent = storyState.mode === 'story' ? 'Je bent verslagen in Chapter ' + (storyState.chapter+1) + '. Probeer het opnieuw!' : 'De chaos was te sterk.';
    }, 1000);
    return true;
  }
  if (G.enemies.every(function(f){return !f.alive;})) {
    setTimeout(function() {
      if (storyState.mode === 'story') {
        // Heal between story battles
        G.party.forEach(function(p){ if (p.alive) { p.curHp = Math.min(p.maxHp, p.curHp + Math.floor(p.maxHp * 0.3)); p.curMp = Math.min(p.maxMp, (p.curMp||0) + 15); } });
        G.party.forEach(function(p){ if (!p.alive) { p.alive = true; p.curHp = Math.floor(p.maxHp * 0.3); }});
        G.items.potion = Math.min(5, G.items.potion + 1);
        storyState.battleIdx++;
        var ch = CHAPTERS[storyState.chapter];
        if (storyState.battleIdx >= ch.battles.length) {
          storyState.phase = 'dialogue_outro';
          currentDialogues = ch.dialogues.outro;
          dialogueIdx = 0;
          showScreen('dialogue-screen');
          showDialogue();
        } else {
          showTransition();
        }
      } else {
        freePlayBattleWon();
      }
    }, 1000);
    return true;
  }
  return false;
}
function showTransition() {
  showScreen('transition-screen');
  var ch = CHAPTERS[storyState.chapter];
  var nextBattle = ch.battles[storyState.battleIdx];
  document.getElementById('trans-title').textContent = 'Victory! ⚔️';
  document.getElementById('trans-sub').textContent = nextBattle ? 'Volgende: ' + nextBattle.label : 'Voorbereiden...';
  document.getElementById('trans-party').innerHTML = G.party.map(function(p) {
    return '<div class="tp-card"><div class="tp-emoji">' + p.emoji + '</div><div class="tp-name">' + p.name + '</div><div class="tp-hp" style="color:' + (p.alive?'var(--mint)':'var(--coral)') + '">' + p.curHp + '/' + p.maxHp + '</div></div>';
  }).join('');
  document.getElementById('btn-next').onclick = function() {
    if (storyState.mode === 'story') {
      storyState.phase = 'dialogue_midBoss_done';
      startStoryBattle();
    }
  };
  saveGame();
}

// ===== FREE PLAY BATTLES =====
var freePlayBattle = 0;
var FREE_ENEMIES = [
  [{name:'Sticker Spammer',emoji:'📱',hp:55,atk:16,def:7,spd:14,spc:8,moves:[{name:'Spam',type:'atk',power:18},{name:'Flood',type:'atk_all',power:10}]},{name:'Emoji Bot',emoji:'🤖',hp:45,atk:12,def:5,spd:16,spc:10,moves:[{name:'Blast',type:'atk',power:16}]}],
  [{name:'Ragebait Troll',emoji:'🧌',hp:70,atk:20,def:10,spd:12,spc:8,moves:[{name:'Provoke',type:'atk',power:24},{name:'Flame',type:'atk',power:28,effect:'burn'}]},{name:'Blue Tick Ghost',emoji:'👻',hp:65,atk:22,def:8,spd:18,spc:10,moves:[{name:'Seen',type:'atk',power:30},{name:'Ghost',type:'debuff',effect:'stun'}]}],
  [{name:'Meme Overlord',emoji:'🎭',hp:110,atk:26,def:14,spd:13,spc:20,moves:[{name:'Meme Beam',type:'atk',power:36},{name:'Viral',type:'atk_all',power:22},{name:'Deep Fried',type:'atk',power:48,effect:'burn'}]}],
  [{name:'GC Demon',emoji:'👹',hp:130,atk:30,def:16,spd:14,spc:16,moves:[{name:'Chat Nuke',type:'atk_all',power:26},{name:'Demonic Spam',type:'atk',power:42},{name:'Soul Drain',type:'atk',power:32,effect:'heal_self',heal:18}]},{name:'Algorithm Beast',emoji:'🦾',hp:120,atk:28,def:18,spd:16,spc:20,moves:[{name:'Data Strike',type:'atk',power:38},{name:'Override',type:'atk_all',power:22}]}],
  [{name:'The Unranked',emoji:'❓',hp:200,atk:34,def:18,spd:16,spc:26,boss:true,moves:[{name:'Mystery',type:'atk',power:46},{name:'Rank Destroyer',type:'atk_all',power:28},{name:'Void Shield',type:'buff',effect:'shield',target:'self'},{name:'Oblivion',type:'atk',power:62,effect:'stun'}]}]
];
function startFreePlayBattles() {
  G.party = picked.map(function(id){return makeFighter(HEROES.find(function(h){return h.id===id;}),false);});
  freePlayBattle = 0;
  G.items = {potion:3,elixir:2};
  nextFreePlayBattle();
}
function nextFreePlayBattle() {
  if (freePlayBattle >= FREE_ENEMIES.length) {
    showScreen('result-screen');
    document.getElementById('result-title').textContent = '🏆 Victory!';
    document.getElementById('result-sub').textContent = 'Je hebt alle 5 battles overwonnen!';
    return;
  }
  var mod = diffMods[difficulty];
  G.enemies = FREE_ENEMIES[freePlayBattle].map(function(e){
    var s = JSON.parse(JSON.stringify(e)); s.hp=Math.round(s.hp*mod.hp); s.atk=Math.round(s.atk*mod.atk); s.def=Math.round(s.def*mod.def); return makeFighter(s,true);
  });
  G.log = [];
  showScreen('battle-screen');
  document.getElementById('battle-label').textContent = 'Battle ' + (freePlayBattle+1) + '/5';
  buildTurnOrder();
  renderBattle();
  nextTurn();
}
function freePlayBattleWon() {
  freePlayBattle++;
  G.party.forEach(function(p){if(p.alive){p.curHp=Math.min(p.maxHp,p.curHp+Math.floor(p.maxHp*0.3));p.curMp=Math.min(p.maxMp,(p.curMp||0)+15);}});
  G.party.forEach(function(p){if(!p.alive){p.alive=true;p.curHp=Math.floor(p.maxHp*0.3);}});
  G.items.potion = Math.min(5, G.items.potion + 1);
  if (freePlayBattle >= FREE_ENEMIES.length) { nextFreePlayBattle(); return; }
  showScreen('transition-screen');
  document.getElementById('trans-title').textContent = 'Battle ' + freePlayBattle + ' gewonnen!';
  document.getElementById('trans-sub').textContent = 'Volgende: Battle ' + (freePlayBattle+1) + '/5';
  document.getElementById('trans-party').innerHTML = G.party.map(function(p){return '<div class="tp-card"><div class="tp-emoji">'+p.emoji+'</div><div class="tp-name">'+p.name+'</div><div class="tp-hp" style="color:'+(p.alive?'var(--mint)':'var(--coral)')+'">'+p.curHp+'/'+p.maxHp+'</div></div>';}).join('');
  document.getElementById('btn-next').onclick = nextFreePlayBattle;
}

// ===== UI ACTIONS =====
function showActions(fighter) {
  var f = fighter || G.turnOrder[G.turnIdx];
  if (!f || f.isEnemy) return;
  document.getElementById('moves-panel').classList.remove('active');
  document.getElementById('target-panel').classList.remove('active');
  document.getElementById('items-panel').classList.remove('active');
  var ap = document.getElementById('action-panel');
  ap.style.display = 'flex';
  document.getElementById('action-title').textContent = f.emoji + ' ' + f.name + ' — Kies actie';
  document.getElementById('action-grid').innerHTML = '<button class="act-btn btn-atk" onclick="showMoves(\'atk\')">⚔️ Aanval</button><button class="act-btn btn-spc" onclick="showMoves(\'spc\')">✨ Special<span class="cost">MP: '+(f.curMp||0)+'</span></button><button class="act-btn btn-def" onclick="doDefend()">🛡️ Verdedig</button><button class="act-btn btn-itm" onclick="showItems()">🧪 Items<span class="cost">'+(G.items.potion+G.items.elixir)+' over</span></button>';
}
function showMoves(type) {
  var f = G.turnOrder[G.turnIdx];
  document.getElementById('action-panel').style.display = 'none';
  document.getElementById('moves-panel').classList.add('active');
  var moves = type === 'atk' ? [f.moves[0]] : f.moves.slice(1);
  document.getElementById('moves-list').innerHTML = moves.map(function(m, i) {
    var canUse = (m.cost||0) <= (f.curMp||0);
    var realIdx = type === 'atk' ? 0 : i+1;
    return '<button class="move-btn" '+(canUse?'':'disabled')+' onclick="selectMove('+realIdx+')"><span>'+m.name+' <small style="opacity:.5">'+((m.desc||''))+'</small></span>'+(m.cost?'<span class="mv-cost">'+m.cost+' MP</span>':'')+'</button>';
  }).join('');
}
function selectMove(idx) {
  var f = G.turnOrder[G.turnIdx];
  G.selectedMove = f.moves[idx];
  if (['atk','debuff'].indexOf(G.selectedMove.type) !== -1) showTargets('enemy');
  else if (G.selectedMove.type === 'heal') showTargets('ally');
  else executePlayerMove(G.selectedMove, null);
}
function showTargets(side) {
  document.getElementById('moves-panel').classList.remove('active');
  document.getElementById('target-panel').classList.add('active');
  document.getElementById('target-title').textContent = side==='enemy'?'Kies vijand':'Kies bondgenoot';
  var targets = side==='enemy' ? G.enemies.filter(function(f){return f.alive;}) : G.party.filter(function(f){return f.alive;});
  document.getElementById('target-list').innerHTML = targets.map(function(t,i){
    return '<button class="tgt-btn" onclick="executePlayerMove(G.selectedMove,'+(side==='enemy'?'G.enemies':'G.party')+'.filter(function(f){return f.alive;})['+i+'])">'+t.emoji+' '+t.name+' ('+t.curHp+'/'+t.maxHp+' HP)</button>';
  }).join('');
}
function executePlayerMove(move, target) {
  document.getElementById('moves-panel').classList.remove('active');
  document.getElementById('target-panel').classList.remove('active');
  document.getElementById('items-panel').classList.remove('active');
  document.getElementById('action-panel').style.display = 'none';
  var f = G.turnOrder[G.turnIdx];
  var enemies = G.enemies.filter(function(e){return e.alive;});
  var allies = G.party.filter(function(p){return p.alive;});
  executeMove(f, move, f.isEnemy ? allies : enemies, target);
}
function doDefend() {
  var f = G.turnOrder[G.turnIdx];
  f.defending = true;
  addLog(f.emoji + ' ' + f.name + ' verdedigt! 🛡️', 'info');
  document.getElementById('action-panel').style.display = 'none';
  renderBattle();
  setTimeout(nextTurn, 500);
}
function showItems() {
  document.getElementById('action-panel').style.display = 'none';
  document.getElementById('items-panel').classList.add('active');
  document.getElementById('items-list').innerHTML = '<button class="move-btn" '+(G.items.potion>0?'':'disabled')+' onclick="useItem(\'potion\')"><span>🧪 Heal Potion — 50 HP</span><span class="mv-cost">'+G.items.potion+'x</span></button><button class="move-btn" '+(G.items.elixir>0?'':'disabled')+' onclick="useItem(\'elixir\')"><span>⚡ MP Elixir — 25 MP</span><span class="mv-cost">'+G.items.elixir+'x</span></button>';
}
function useItem(type) {
  document.getElementById('items-panel').classList.remove('active');
  G.selectedAction = type;
  document.getElementById('target-panel').classList.add('active');
  document.getElementById('target-title').textContent = 'Gebruik op wie?';
  var targets = G.party.filter(function(f){return f.alive;});
  document.getElementById('target-list').innerHTML = targets.map(function(t,i){
    return '<button class="tgt-btn" onclick="applyItem(\''+type+'\','+i+')">'+t.emoji+' '+t.name+' ('+t.curHp+'/'+t.maxHp+' HP, '+(t.curMp||0)+' MP)</button>';
  }).join('');
}
function applyItem(type, idx) {
  document.getElementById('target-panel').classList.remove('active');
  var target = G.party.filter(function(f){return f.alive;})[idx];
  if (type === 'potion') { G.items.potion--; target.curHp = Math.min(target.maxHp, target.curHp + 50); addLog('🧪 '+target.name+' +50 HP!', 'heal'); }
  else { G.items.elixir--; target.curMp = Math.min(target.maxMp, (target.curMp||0) + 25); addLog('⚡ '+target.name+' +25 MP!', 'heal'); }
  renderBattle();
  setTimeout(nextTurn, 500);
}

// ===== RENDER =====
function renderBattle() {
  document.getElementById('party-side').innerHTML = G.party.map(renderFighter).join('');
  document.getElementById('enemy-side').innerHTML = G.enemies.map(renderFighter).join('');
  renderLog();
}
function renderFighter(f) {
  var hpPct = f.maxHp ? (f.curHp / f.maxHp * 100) : 0;
  var hpClass = hpPct > 50 ? '' : hpPct > 25 ? 'mid' : 'low';
  var mpPct = f.maxMp ? ((f.curMp||0) / f.maxMp * 100) : 0;
  var cur = G.turnOrder[G.turnIdx];
  var isActive = cur && cur === f;
  var statIcons = f.statuses.map(function(s){var icons={burn:'🔥',stun:'⚡',confuse:'🌀'};return '<span class="status-icon">'+(icons[s.type]||'?')+'</span>';}).join('');
  return '<div class="fighter '+ (!f.alive?'ko':'') + ' ' + (isActive?'active-turn':'') + ' ' + (f.boss?'boss-fighter':'') + '" id="f-'+(f.id||f.name)+'">' +
    '<span class="f-emoji">'+f.emoji+'</span><div class="f-info"><div class="f-name">'+f.name+(f.defending?' 🛡️':'')+(f.shield?' ✨':'')+'</div>' +
    '<div class="f-hp-row"><div class="f-hp-bar"><div class="f-hp-fill '+hpClass+'" style="width:'+hpPct+'%"></div></div><span class="f-hp-text">'+f.curHp+'/'+f.maxHp+'</span></div>' +
    (f.maxMp?'<div class="f-mp-row"><div class="f-mp-bar"><div class="f-mp-fill" style="width:'+mpPct+'%"></div></div><span class="f-mp-text">'+(f.curMp||0)+'/'+f.maxMp+'</span></div>':'') +
    '<div class="f-status">'+statIcons+'</div></div></div>';
}
function renderLog() {
  var box = document.getElementById('log-box');
  box.innerHTML = G.log.slice(-8).map(function(l){return '<div class="'+l.cls+'">'+l.text+'</div>';}).join('');
  box.scrollTop = box.scrollHeight;
}
function addLog(text, cls) { G.log.push({text:text,cls:cls||'info'}); renderLog(); }

// ===== INIT =====
document.getElementById('btn-start').addEventListener('click', function() {
  if (storyState.mode === 'free') startFreePlayBattles();
  else {
    G.party = picked.map(function(id){return makeFighter(HEROES.find(function(h){return h.id===id;}),false);});
    showChapterIntro();
  }
});
checkSave();
</script>
